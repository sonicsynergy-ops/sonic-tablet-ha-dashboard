  ha-switch-checked-thumb-border-color: white
  ha-switch-thumb-background-color: rgba(255,255,255,0.6)
  ha-switch-thumb-border-color: rgba(255,255,255,0.6)
  ha-switch-background-color: rgba(255,255,255,0.2)

  # Tables / markdown / history
  table-row-background-color: rgba(255,255,255,0.03)
  table-row-alternative-background-color: rgba(255,255,255,0.06)
  data-table-background-color: transparent
  markdown-code-background-color: rgba(255,255,255,0.08)
  trace-line-color: rgb(100,180,255)
