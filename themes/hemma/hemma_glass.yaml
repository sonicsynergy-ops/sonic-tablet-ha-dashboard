        --ha-list-item-focus-radius: var(--ha-card-border-radius) !important;
      }

      @media (hover: none) {
        ha-md-list-item,
        ha-list-item-button {
          --md-list-item-hover-state-layer-opacity: 0 !important;
          --ha-ripple-hover-opacity: 0 !important;
        }
      }

  card-mod-drawer-yaml: |
    .: |
      .mdc-drawer, .sidebar-shell {
        background-color: var(--sidebar-background-color) !important;
        border-inline-end: none !important;
        box-shadow: none !important;
      }
    wa-drawer$: |
      dialog {
        backdrop-filter: blur(20px) saturate(1.2) !important;
        -webkit-backdrop-filter: blur(20px) saturate(1.2) !important;
      }

  card-mod-sidebar: |
    :host {
      background: none !important;
      backdrop-filter: var(--ha-card-backdrop-filter);
    }

  card-mod-view-yaml: |
    hui-view:
      $: |
        :host {
          background: none !important;
        }
        @media (max-width: 767px) and (orientation: portrait) {
          :host {
            overscroll-behavior: none !important;
          }
        }

    ha-card:
      $: |
        :host {
          --mdc-ripple-press-opacity: 0 !important;
          --mdc-ripple-hover-opacity: 0 !important;
          --mdc-ripple-focus-opacity: 0 !important;
          --mdc-ripple-color: transparent !important;
          -webkit-tap-highlight-color: transparent !important;
        }

  card-mod-card: |
    ha-card {
      background: var(--ha-card-background, rgba(0,0,0,0.2));
      border-radius: var(--ha-card-border-radius, 16px);
      transition: filter .22s ease, transform .12s ease, box-shadow .24s ease !important;
      will-change: filter, transform;
    }

    @media (hover:hover) {
      :host(:not(.hemma-room)) ha-card:not(.type-custom-navbar-card):hover {
        box-shadow: var(--hemma-card-hover-shadow, var(--button-card-box-shadow-hover, var(--ha-shadow-light-hover))) !important;
      }
      :host(:not(.hemma-room)) ha-card:not(.type-custom-navbar-card):hover,
      :host(:not(.hemma-room)) ha-card:not(.type-custom-navbar-card):focus-within {
        filter: var(--hemma-card-hover-filter, brightness(1.04)) !important;
      }
    }

    @media (hover:none) {
      :host(:not(.hemma-room)) ha-card:not(.type-custom-navbar-card):active {
        filter: var(--hemma-card-hover-filter, brightness(1.04)) !important;
        box-shadow: var(--hemma-card-hover-shadow, var(--button-card-box-shadow-hover, var(--ha-shadow-light-hover))) !important;
      }
    }

    :host(.hemma-entity) {
      position: relative !important;
      z-index: 0 !important;
      display: block !important;
      border-radius: var(--ha-card-border-radius, 28px) !important;
      overflow: visible !important;
      contain: none !important;
    }

    :host(.hemma-entity) ha-card {
      position: relative !important;
      z-index: 0 !important;
      border-radius: inherit !important;
      overflow: hidden !important;
      background-clip: padding-box;
      background-image: var(--hemma-entity-top-gradient);
    }

    :host(.hemma-entity) ha-card:active {
      transform: translateY(.5px);
      backface-visibility: hidden;
      will-change: transform;
    }

    :host(.hemma-hero),
    :host(.hemma-hero) ha-card,
    :host(.hemma-hero) .button-card-main,
    :host(.hemma-hero) .button-card-content{
      direction: ltr !important;
      text-align: left !important;
    }

    /* Energy dashboard */
    .mdc-data-table,
    .mdc-data-table__row,
    .mdc-data-table__header-cell,
    ha-sankey-chart {
      background: none !important;
    }

  # ============================================================================
  # UIX — VIEW BACKGROUNDS
  # ============================================================================

  uix-theme: "Hemma Glass"

  uix-drawer: |
    .mdc-drawer, .sidebar-shell {
      background-color: var(--sidebar-background-color) !important;
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border-right: none !important;
      box-shadow: none !important;
    }
    :host {
      {%- if panel.viewUrlPath == 'electricity' -%}
      --uix-view-background-cover: full;
      --uix-view-background: linear-gradient(rgba(55,55,55,0.50),rgba(55,55,55,0.50)),center/cover no-repeat url('/local/hemma/rooms/home.jpg')
      {%- endif -%};
    }
    @media (prefers-color-scheme: dark) {
      :host {
        {%- if panel.viewUrlPath == 'electricity' -%}
        --uix-view-background: linear-gradient(rgba(55,55,55,0.50),rgba(55,55,55,0.50)),center/cover no-repeat url('/local/hemma/rooms/home-night.jpg')
        {%- endif -%};
      }
    }
    @media (max-width: 767px) {
      :host {
        {%- if panel.viewUrlPath == 'electricity' -%}
        --uix-view-background: linear-gradient(rgba(80,80,80,0.20),rgba(80,80,80,0.20)),center/cover no-repeat url('/local/hemma/mobile/mobile-day.jpg')
        {%- endif -%};
      }
    }
    @media (max-width: 767px) and (prefers-color-scheme: dark) {
      :host {
        {%- if panel.viewUrlPath == 'electricity' -%}
        --uix-view-background: linear-gradient(rgba(80,80,80,0.20),rgba(80,80,80,0.20)),center/cover no-repeat url('/local/hemma/mobile/mobile-day-dark.jpg')
        {%- endif -%};
      }
    }

  uix-view-background: |
    .uix-bg-image {
      filter: blur(4px) saturate(1.02) brightness(0.985);
    }
    @media (max-width: 767px) {
      .uix-bg-image {
        filter: saturate(1.00) brightness(0.85);
      }
    }
