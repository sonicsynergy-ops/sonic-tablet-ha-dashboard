        #root > :nth-child(5), #root > :nth-child(6)  { --hemma-entity-anim-delay: 0.12s; }
        #root > :nth-child(7), #root > :nth-child(8)  { --hemma-entity-anim-delay: 0.18s; }
        #root > :nth-child(9), #root > :nth-child(10) { --hemma-entity-anim-delay: 0.24s; }
      }
      /* Desktop: individual left-to-right stagger (40ms per card) */
