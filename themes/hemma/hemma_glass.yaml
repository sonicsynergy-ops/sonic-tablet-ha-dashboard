Hemma Glass:
  modes:
    light:
      # ============================================================================
      # MODE: LIGHT — SURFACES / BACKGROUNDS / TEXT
      # ============================================================================

      primary-background-color: rgb(50,50,50)
      secondary-background-color: rgb(40,40,40)
      ha-card-background: rgba(100,100,100,0.1)
      ha-card-background-active: rgba(255,255,255,0.3)
      badge-background: rgba(0,0,0,0.35)
      text-primary-color: rgba(255,255,255,0.95)
      secondary-text-color: rgba(240,240,240,0.9)
      disabled-text-color: rgba(245,245,245,0.65)
      sidebar-background-color: var(--ha-card-background)
      sidebar-icon-color: var(--text-primary-color)
      sidebar-text-color: "#E4E4E4"

      # ============================================================================
      # MODE: LIGHT — ENTITY TOKENS
      # ============================================================================

      hemma-entity-background: rgba(50,50,50,0.15)
      hemma-entity-background-active: rgba(255,255,255,0.25)
      hemma-entity-background-mobile: rgba(0,0,0,0.25)
      hemma-entity-background-active-mobile: rgba(200,200,200,0.45)
      hemma-entity-top-gradient: "linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.67) 4%, rgba(0,0,0,0.60) 8%, rgba(0,0,0,0.51) 15%, rgba(0,0,0,0.42) 22%, rgba(0,0,0,0.34) 30%, rgba(0,0,0,0.26) 38%, rgba(0,0,0,0.19) 47%, rgba(0,0,0,0.12) 57%, rgba(0,0,0,0.07) 67%, rgba(0,0,0,0.03) 78%, rgba(0,0,0,0.01) 88%, rgba(0,0,0,0) 100%)"
      hemma-entity-active-gradient: "linear-gradient(to bottom, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.36) 5%, rgba(255,255,255,0.34) 10%, rgba(255,255,255,0.33) 15%, rgba(255,255,255,0.32) 20%, rgba(255,255,255,0.31) 25%, rgba(255,255,255,0.30) 30%, rgba(255,255,255,0.30) 35%, rgba(255,255,255,0.29) 40%, rgba(255,255,255,0.28) 50%, rgba(255,255,255,0.26) 60%, rgba(255,255,255,0.24) 72%, rgba(255,255,255,0.22) 84%, rgba(255,255,255,.20) 100%)"
      hemma-entity-active-gradient-mobile: "linear-gradient(to bottom, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0.63) 12%, rgba(255,255,255,0.61) 25%, rgba(255,255,255,0.58) 40%, rgba(255,255,255,0.54) 55%, rgba(255,255,255,0.52) 70%, rgba(255,255,255,0.50) 85%, rgba(255,255,255,0.48) 100%)"
      hemma-entity-name: rgba(255,255,255,0.95)
      hemma-entity-name-active: rgba(255,255,255,1)
      hemma-entity-name-active-mobile: rgba(0,0,0,0.88)
      hemma-entity-state: rgba(240,240,240,0.85)
      hemma-entity-state-opacity: 0.78
      hemma-entity-state-active: rgba(245,245,245,0.98)
      hemma-entity-state-active-mobile: rgba(0,0,0,0.55)
      hemma-entity-state-active-color: rgba(255,255,255,0.90)
      hemma-entity-state-active-color-mobile: rgba(0,0,0,0.65)

      # ============================================================================
      # MODE: LIGHT — NAV / POPUP / CONTROL TOKENS
      # ============================================================================

      navbar-primary-color: var(--hemma-nav-icon-active)
      hemma-nav-bg: rgba(0,0,0,0.3)
      hemma-nav-border: transparent
      hemma-nav-shadow: 0 14px 18px rgba(0,0,0,0.03)
      hemma-nav-specular-start: rgba(255,255,255,0.33)
      hemma-nav-specular-mid: rgba(255,255,255,0.28)
      hemma-nav-specular-end: rgba(255,255,255,0.33)
      hemma-nav-inactive-opacity: 0.7
      hemma-nav-icon: rgba(255,255,255,0.85)
      hemma-nav-icon-active: rgba(255,255,255,1)
      hemma-navbar-icon-small: rgba(255,255,255,0.12)
      hemma-nav-active-fill: rgba(255,255,255,0.3)
      hemma-navbar-active-color: "#FFFFFF"

      hemma-navbar-popup-bg: rgba(0,0,0,0.3)
      hemma-navbar-popup-specular-start: rgba(255,255,255,0.5)
      hemma-navbar-popup-specular-mid: rgba(255,255,255,0.24)
      hemma-navbar-popup-specular-end: rgba(255,255,255,0.45)
      hemma-popup-entity-background: rgba(0,0,0,0.4)
      hemma-popup-entity-hover: rgba(0,0,0,0.5)
      hemma-popup-entity-border-hover: rgba(0,0,0,0.08)
      hemma-popup-tile-background: rgba(255,255,255,0.10)
      hemma-popup-tile-text-primary: 'rgba(255,255,255,0.95)'
      hemma-popup-tile-text-secondary: 'rgba(255,255,255,0.75)'
      hemma-popup-tile-text-muted: 'rgba(255,255,255,0.52)'
      hemma-popup-tile-hover: rgba(255,255,255,0.14)
      hemma-popup-progress-track: rgba(255,255,255,0.14)

      hemma-card-specular-start: rgba(255,255,255,0.24)
      hemma-card-specular-mid: rgba(255,255,255,0.16)
      hemma-card-specular-end: rgba(255,255,255,0.20)

      hemma-control-off: rgba(0,0,0,0.1)
      hemma-control-on: rgba(255,255,255,0.2)
      thermostat-card-off: var(--hemma-control-off)
      thermostat-card-on: var(--hemma-control-on)

      hemma-nav-img-filter: invert(1)
      hemma-toggle-active-opacity: 1
      hemma-toggle-inactive-opacity: 0.60
      hemma-toggle-track-fill: rgba(0,0,0,0.6)

      # ============================================================================
      # MODE: LIGHT — COMPONENT / SYSTEM TOKENS
      # ============================================================================

      ha-card-box-shadow: var(--ha-card-box-shadow-light)
      dialog-box-shadow: var(--hemma-dialog-shadow)
      hemma-dialog-shadow: "inset 0 0 0 1px rgba(255,255,255,0.15), inset 3px 3px 1px -3px rgba(255,255,255,0.15), inset -3px -3px 1px -3px rgba(255,255,255,0.15), inset 0 10px 20px -14px rgba(255,255,255,0.25), inset 0 -10px 20px -14px rgba(255,255,255,0.25)"
      button-card-box-shadow: var(--ha-shadow-light)
      button-card-box-shadow-mobile: var(--ha-shadow-light-mobile)
      button-card-box-shadow-active: var(--ha-shadow-light)
      button-card-box-shadow-active-mobile: var(--ha-shadow-light-mobile)
      button-card-box-shadow-hover: var(--ha-shadow-light-hover)
      button-card-box-shadow-hover-mobile: var(--ha-shadow-light-mobile)
      mdc-dialog-scrim-color: rgba(0,0,0,0.25)

      ha-color-fill-primary-normal-resting: var(--hemma-nav-bg)
      ha-color-fill-primary-quiet-resting: rgba(100,100,100,0.25)
      ha-color-fill-primary-quiet-hover: rgba(100,100,100,0.3)
      ha-color-form-background: var(--ha-card-background)
      ha-color-form-background-disabled: var(--ha-card-background)
      ha-color-form-background-hover: var(--ha-card-background)
      ha-color-text-secondary: var(--secondary-text-color)
      ha-color-fill-neutral-quiet-resting: transparent
      wa-color-text-quiet: var(--secondary-text-color)
      ha-tooltip-text-color: black

      mdc-text-field-fill-color: rgba(50,50,50,0.4)
      mdc-select-fill-color: rgba(50,50,50,0.4)
      mdc-theme-surface: var(--ha-card-background)
      md-list-container-color: var(--ha-card-background)
      dialog-background-color: var(--ha-card-background)

      hemma-dialog-bg: rgba(0,0,5,0.3)
      ha-dialog-background: var(--hemma-dialog-bg)
      ha-dialog-surface-background: var(--hemma-dialog-bg)

      hemma-popup-text-primary:   'rgba(0,0,0,0.88)'
      hemma-popup-text-secondary: 'rgba(0,0,0,0.55)'
      hemma-popup-text-muted:     'rgba(0,0,0,0.38)'
      hemma-popup-divider:        'rgba(0,0,0,0.08)'

    dark:
      # ============================================================================
      # MODE: DARK — SURFACES / BACKGROUNDS / TEXT
      # ============================================================================

      primary-background-color: rgb(40,40,40)
      secondary-background-color: rgb(20,20,20)
      ha-card-background: rgba(0,0,0,0.4)
      ha-card-background-active: rgba(240,240,240,0.07)
      badge-background: rgba(0,0,0,0.5)
      text-primary-color: rgba(255,255,255,0.98)
      secondary-text-color: rgba(240,240,240,0.9)
      disabled-text-color: rgba(208,208,208,0.5)
      sidebar-background-color: var(--ha-card-background)
      sidebar-icon-color: var(--text-primary-color)
      sidebar-text-color: "#a8a8a8"

      # ============================================================================
      # MODE: DARK — ENTITY TOKENS
      # ============================================================================

      hemma-entity-background: rgba(0,0,0,.1)
      hemma-entity-background-active: rgba(255,255,255,0.25)
      hemma-entity-background-mobile: rgba(0,0,0,0.18)
      hemma-entity-background-active-mobile: rgba(255,255,255,0.25)
      hemma-entity-top-gradient: "linear-gradient(to bottom, rgba(0,0,0,0.80) 0%, rgba(0,0,0,0.74) 4%, rgba(0,0,0,0.67) 8%, rgba(0,0,0,0.57) 15%, rgba(0,0,0,0.47) 22%, rgba(0,0,0,0.38) 30%, rgba(0,0,0,0.29) 38%, rgba(0,0,0,0.21) 47%, rgba(0,0,0,0.13) 57%, rgba(0,0,0,0.08) 67%, rgba(0,0,0,0.03) 78%, rgba(0,0,0,0.01) 88%, rgba(0,0,0,0) 100%)"
      hemma-entity-active-gradient: "linear-gradient(to bottom, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.22) 12%)"
      hemma-entity-active-gradient-mobile: "linear-gradient(to bottom, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0.63) 12%, rgba(255,255,255,0.61) 25%, rgba(255,255,255,0.58) 40%, rgba(255,255,255,0.55) 55%, rgba(255,255,255,0.52) 70%, rgba(255,255,255,0.49) 85%, rgba(255,255,255,0.47) 100%)"
      hemma-entity-name: rgba(255,255,255,0.85)
      hemma-entity-name-active: rgba(255,255,255,1)
      hemma-entity-name-active-mobile: rgba(0,0,0,0.88)
      hemma-entity-state: rgba(255,255,255,0.7)
      hemma-entity-state-opacity: 0.75
      hemma-entity-state-active: rgba(255,255,255,0.8)
      hemma-entity-state-active-mobile: rgba(0,0,0,0.55)
      hemma-entity-state-active-color: rgba(255,255,255,0.85)
      hemma-entity-state-active-color-mobile: rgba(0,0,0,0.85)

      # ============================================================================
      # MODE: DARK — NAV / POPUP / CONTROL TOKENS
      # ============================================================================

      navbar-primary-color: var(--hemma-nav-icon-active)
      hemma-nav-bg: rgba(0,0,0,0.3)
      hemma-nav-border: transparent
      hemma-nav-shadow: 0 14px 24px rgba(0,0,0,0.08)
      hemma-nav-specular-start: rgba(255,255,255,0.3)
      hemma-nav-specular-mid: rgba(255,255,255,0.20)
      hemma-nav-specular-end: rgba(255,255,255,0.3)
      hemma-nav-inactive-opacity: 0.72
      hemma-nav-icon: rgba(255,255,255,0.96)
      hemma-nav-icon-active: rgba(255,255,255,0.96)
      hemma-navbar-icon-small: rgba(255,255,255,0.06)
      hemma-nav-active-fill: rgba(255,255,255,0.3)
      hemma-navbar-active-color: "#FFFFFF"

      hemma-navbar-popup-bg: rgba(0,0,0,0.2)
      hemma-navbar-popup-specular-start: rgba(255,255,255,0.28)
      hemma-navbar-popup-specular-mid: rgba(255,255,255,0.22)
      hemma-navbar-popup-specular-end: rgba(255,255,255,0.20)
      hemma-popup-entity-background: rgba(40,40,40,0.4)
      hemma-popup-entity-hover: rgba(65,65,65,0.6)
      hemma-popup-entity-border-hover: rgba(255,255,255,0.08)
      hemma-popup-tile-background: rgba(255,255,255,0.07)
      hemma-popup-tile-text-primary: 'rgba(255,255,255,0.95)'
      hemma-popup-tile-text-secondary: 'rgba(255,255,255,0.75)'
      hemma-popup-tile-text-muted: 'rgba(255,255,255,0.52)'
      hemma-popup-tile-hover: rgba(255,255,255,0.09)
      hemma-popup-progress-track: rgba(255,255,255,0.09)

      hemma-card-specular-start: rgba(255,255,255,0.20)
      hemma-card-specular-mid: rgba(255,255,255,0.13)
      hemma-card-specular-end: rgba(255,255,255,0.18)

      hemma-control-off: rgba(0,0,0,0.2)
      hemma-control-on: rgba(255,255,255,0.2)
      thermostat-card-off: var(--hemma-control-off)
      thermostat-card-on: var(--hemma-control-on)

      hemma-toggle-inactive-opacity: 0.65
      hemma-toggle-active-opacity: 0.80
      hemma-toggle-track-fill: rgba(0,0,0,0.75)

      # ============================================================================
      # MODE: DARK — COMPONENT / SYSTEM TOKENS
      # ============================================================================

      ha-card-box-shadow: var(--ha-card-box-shadow-dark)
      dialog-box-shadow: var(--hemma-dialog-shadow)
      hemma-dialog-shadow: "inset 0 0 0 1px rgba(255,255,255,0.12), inset 3px 3px 1px -3.5px rgba(120,120,120,0.1), inset -3px -3px 1px -3.5px rgba(120,120,120,0.1), inset 0 10px 18px -16px rgba(255,255,255,0.20), inset 0 -10px 18px -16px rgba(255,255,255,0.12)"
      button-card-box-shadow: var(--ha-shadow-dark)
      button-card-box-shadow-active: var(--ha-shadow-dark)
      button-card-box-shadow-mobile: var(--ha-shadow-dark-mobile)
      button-card-box-shadow-active-mobile: var(--ha-shadow-dark-mobile)
      button-card-box-shadow-hover: var(--ha-shadow-dark-hover)
      button-card-box-shadow-hover-mobile: var(--ha-shadow-dark-mobile)

      hemma-dialog-bg: rgba(0,0,0,0.35)
      ha-dialog-background: var(--hemma-dialog-bg)
      ha-dialog-surface-background: var(--hemma-dialog-bg)

      ha-color-fill-primary-normal-resting: var(--hemma-nav-bg)
      ha-color-fill-primary-quiet-resting: rgba(100,100,100,0.25)
      ha-color-fill-primary-quiet-hover: rgba(100,100,100,0.3)
      ha-color-form-background: var(--ha-card-background)
      ha-color-form-background-disabled: var(--ha-card-background)
      ha-color-form-background-hover: var(--ha-card-background)
      ha-color-text-secondary: var(--secondary-text-color)
      ha-color-fill-neutral-quiet-resting: transparent
      wa-color-text-quiet: var(--secondary-text-color)

      mdc-text-field-fill-color: var(--primary-background-color)
      mdc-select-fill-color: var(--primary-background-color)
      mdc-theme-surface: var(--ha-card-background)
      md-list-container-color: var(--ha-card-background)
      dialog-background-color: var(--ha-card-background)

      hemma-popup-text-primary:   '#ffffff'
      hemma-popup-text-secondary: 'rgba(255,255,255,0.6)'
      hemma-popup-text-muted:     'rgba(255,255,255,0.45)'
      hemma-popup-divider:        'rgba(255,255,255,0.07)'

  # ============================================================================
  # SHADOWS
  # ============================================================================

  ha-shadow-light: >
    inset 0 0 0 1px rgba(255,255,255,0.03),
    inset 2.5px 2.5px 1.5px -3.5px rgba(255,255,255,0.2),
    inset -2.5px -2.5px 1.5px -3.5px rgba(255,255,255,0.2),
    inset 0 10px 18px -16px rgba(255,255,255,0.25),
    inset 0 -10px 18px -16px rgba(255,255,255,0.25)

  ha-shadow-light-hover: >
    inset 0 0 0 1px rgba(255,255,255,0.03),
    inset 2.5px 2.5px 1.5px -3.5px rgba(255,255,255,0.2),
    inset -2.5px -2.5px 1.5px -3.5px rgba(255,255,255,0.2),
    inset 0 10px 18px -16px rgba(255,255,255,0.25),
    inset 0 -10px 18px -16px rgba(255,255,255,0.25),
    0 8px 20px rgba(0,0,0,0.04)

  ha-shadow-light-mobile: >
    inset 0 0 0 1px rgba(255,255,255,0.03),
    inset 3px 3px 1px -3px rgba(255,255,255,0.22),
    inset -3px -3px 1px -3px rgba(255,255,255,0.22),
    inset 0 10px 18px -16px rgba(255,255,255,0.35),
    inset 0 -10px 18px -16px rgba(255,255,255,0.35)

  ha-shadow-dark: >
    inset 3px 3px 1px -3.5px rgba(120,120,120,0.3),
    inset -3px -3px 1px -3.5px rgba(120,120,120,0.3),
    inset 0 10px 18px -16px rgba(255,255,255,0.16),
    inset 0 -10px 18px -16px rgba(255,255,255,0.16)

  ha-shadow-dark-hover: >
    inset 3px 3px 1px -3.5px rgba(120,120,120,0.3),
    inset -3px -3px 1px -3.5px rgba(120,120,120,0.3),
    inset 0 10px 18px -16px rgba(255,255,255,0.16),
    inset 0 -10px 18px -16px rgba(255,255,255,0.16),
    0 8px 20px rgba(0,0,0,0.04)

  ha-shadow-dark-mobile: >
    inset 3px 3px 1px -3px rgba(140,140,140,0.30),
    inset -3px -3px 1px -3px rgba(140,140,140,0.30),
    inset 0 10px 18px -16px rgba(255,255,255,0.30),
    inset 0 -10px 18px -16px rgba(255,255,255,0.30)

  ha-card-box-shadow-light: >
    inset 0 0 0 1px rgba(255,255,255,0.12),
    inset 3px 3px 1px -3.5px rgba(255,255,255,0.1),
    inset -2px -2px 0.5px -2px rgba(255,255,255,0.1),
    inset 0 10px 18px -16px rgba(255,255,255,0.2),
    inset 0 -10px 18px -16px rgba(255,255,255,0.2)

  ha-card-box-shadow-dark: >
    inset 0 0 0 1px rgba(255,255,255,0.12),
    inset 3px 3px 1px -3.5px rgba(120,120,120,0.1),
    inset -3px -3px 1px -3.5px rgba(120,120,120,0.1),
    inset 0 10px 18px -16px rgba(255,255,255,0.2),
    inset 0 -10px 18px -16px rgba(255,255,255,0.16)

  # ============================================================================
  # TYPOGRAPHY
  # ============================================================================

  primary-font-family: "Hanken Grotesk"
  ha-font-family-body: var(--primary-font-family)
  ha-card-header-font-family: var(--primary-font-family)

  # ============================================================================
  # CORE COLORS
  # ============================================================================

  primary-color: "#6ebaff"
  accent-color: "#6ebaff"
  divider-color: transparent
  app-theme-color: rgb(0,0,0)
  state-inactive-color: "#d1d1d1"
  primary-text-color: "#ffffff"
  icon-primary-color: currentColor
  scrollbar-thumb-color: rgba(255,255,255,0.15)
  lumo-body-text-color: var(--primary-text-color)
  clear-background-color: var(--ha-card-background)
  paper-item-icon-color: currentColor
  rgb-card-background-color: rgb(10,10,10)

  ha-color-on-primary-normal: var(--primary-color)
  ha-color-on-neutral-normal: var(--primary-text-color)
  ha-color-red-40: "#d6314a"
  ha-color-primary-95: "#9c9c9c"
  ha-color-neutral-90: transparent
  state-vacuum-cleaning-color: "#ffffff"

  # ============================================================================
  # SIDEBAR
  # ============================================================================

  sidebar-selected-background-color: var(--primary-background-color)
  sidebar-selected-icon-color: var(--primary-text-color)
  sidebar-selected-text-color: var(--sidebar-selected-icon-color)

  # ============================================================================
  # WEB AWESOME / HA SYSTEM TOKENS
  # ============================================================================

  # Web Awesome
  wa-color-neutral-fill-normal: "#ffffff14"
  wa-color-surface-border: rgba(255,255,255,0.1)
  wa-color-neutral-fill-quiet: var(--primary-color)
  wa-color-neutral-border-loud: var(--hemma-nav-border)
  wa-color-neutral-border-normal: var(--hemma-nav-border)
  wa-color-neutral-border-quiet: var(--hemma-nav-border)
  wa-color-neutral-on-loud: rgba(255,255,255,0.95)
  wa-color-neutral-on-normal: rgba(255,255,255,0.95)
  wa-color-fill-loud: var(--primary-text-color)
  wa-color-neutral-fill-loud: var(--primary-text-color)
  wa-color-on-normal: var(--primary-text-color)
  wa-color-on-quiet: var(--primary-text-color)
  wa-color-neutral-on-quiet: var(--primary-text-color)
  wa-color-text-normal: var(--primary-text-color)

  # HA / MDC system
  ha-border-radius-lg: 12px
  ha-border-radius-sm: 30px
  ha-card-features-border-radius: 30px
  border-end-end-radius: 30px
  wa-border-radius-m: 24px
  wa-border-radius-s: 30px
  wa-shadow-m: var(--ha-card-box-shadow)

  mdc-dialog-scrim-color: rgba(0,0,0,0.5)
  mdc-button-outline-color: rgba(255,255,255,0.15)
  mdc-theme-primary: rgb(100,180,255)
  mdc-shape-small: 30px

  # ============================================================================
  # DIALOGS / CARDS / APP CHROME
  # ============================================================================

  # App Header
  app-header-background-color: rgba(76,80,84,0.3)
  app-header-backdrop-filter: blur(10px)
  app-header-edit-background-color: rgba(0,0,0,0.2)
  app-header-border-bottom: none

  # Dialogs
  ha-dialog-surface-backdrop-filter: blur(15px) saturate(1.2)
  ha-dialog-surface-background: var(--ha-dialog-background)
  ha-dialog-scrim-backdrop-filter: none
  ha-dialog-border-radius: 28px

  # Cards
  card-background-color: var(--secondary-background-color)
  paper-listbox-background-color: var(--primary-background-color)
  ha-card-header-color: var(--primary-text-color)
  paper-card-background-color: var(--ha-card-background)
  ha-card-backdrop-filter: blur(20px) saturate(1.2)
  ha-card-border-color: transparent
  ha-card-border-radius: 28px
  ha-card-border-width: 0
  md-list-item-container-shape: 28px
  stack-card-gap: 0px
  horizontal-stack-card-gap: 10px

  # ============================================================================
  # FORM / INPUT TOKENS
  # ============================================================================

  input-fill-color: rgba(255,255,255,0.06)
  input-ink-color: rgba(255,255,255,0.8)
  input-label-ink-color: rgba(255,255,255,0.6)
  input-idle-line-color: rgba(255,255,255,0.12)
  input-hover-line-color: rgba(100,180,255,0.5)
  input-disabled-fill-color: rgba(255,255,255,0.03)
  input-disabled-ink-color: rgba(255,255,255,0.37)
  input-dropdown-icon-color: rgba(255,255,255,0.54)

  # ============================================================================
  # CODE / EDITOR TOKENS
  # ============================================================================

  codemirror-keyword: rgb(180,130,255)
  codemirror-number: rgb(100,200,130)
  codemirror-string: rgb(255,200,100)
  codemirror-comment: rgba(255,255,255,0.3)
  codemirror-atom: rgb(100,180,255)
  codemirror-property: rgb(255,140,100)
  code-editor-background-color: "#161616"

  # ============================================================================
  # NAVIGATION
  # ============================================================================

  # Navigation sizing / spacing
  hemma-nav-margin-desktop: 8vw
  hemma-nav-margin-tablet: 4.3vw
  hemma-nav-gap-desktop: 50px
  hemma-nav-gap-tablet: 45px
  hemma-nav-top-desktop: 60px
  hemma-nav-top-tablet: 55px
  hemma-nav-backdrop-filter: blur(15px) saturate(1.2)
  hemma-nav-height: 148px

  # Navigation popup styling
  hemma-navbar-popup-br: 25px
  hemma-navbar-popup-blur: blur(20px) saturate(1.1)
  hemma-navbar-popup-shadow: 0 3px 14px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.03)

  # ============================================================================
  # BROWSER MOD POPUPS
  # ============================================================================

  hemma-popup-tile-hover-scale: '1.01'
  hemma-popup-tile-hover-duration: '0.2s'

  # ============================================================================
  # HERO / HEADER LAYOUT
  # ============================================================================

  # Page gutters
  page-gutter-desktop: 8vw
  page-gutter-tablet: 4vw
  page-gutter-mobile: 11px

  # Header top
  header-top-desktop: clamp(300px, 36vh, 400px)
  header-top-tablet: clamp(180px, 38vh, 370px)
  header-top-tablet-portrait: clamp(260px, 28vh, 400px)
  header-top-mobile: clamp(30px, 16vh, 70px)
  header-top-mobile-nudge: -10px

  # Header height
  hemma-header-cap-desktop: clamp(260px, 30vh, 380px)
  hemma-header-cap-tablet: clamp(230px, 28vh, 340px)
  hemma-header-cap-mobile: clamp(240px, 34vh, 360px)
  hemma-header-cap-landscape: clamp(170px, 44vh, 240px)

  # Header adjustments
  hemma-header-temp-nudge: 3px
  hemma-header-badge-nudge: -4px
  hemma-header-media-badge-nudge-desktop: 3px
  hemma-header-media-badge-nudge-mobile: 2px
  hemma-tiles-top-portrait-nudge: 245px

  # ============================================================================
  # HERO TYPOGRAPHY / TEMPERATURE
  # ============================================================================

  # Temperature formatting
  hero-header-gap-desktop: 8px
  hero-header-gap-tablet: 8px
  hero-header-gap-mobile: 8px
  hero-temp-font-size-desktop: 18px
  hero-temp-font-size-tablet: 16px
  hero-temp-font-size-mobile: 14px

  # Hero title sizing
  hero-title-size-desktop: clamp(75px, 4.6vw + 8px, 105px)
  hero-title-size-tablet: clamp(68px, 5.5vw + 8px, 90px)
  hero-title-size-mobile: clamp(38px, 4vw + 2px, 64px)
  hero-title-size-landscape: clamp(28px, 4.6vw + 4px, 40px)

  hero-title-line-height-desktop: 1.18
  hero-title-line-height-tablet: 1.18
  hero-title-line-height-mobile: 1.1
  hero-title-line-height-landscape: 1.10

  hero-title-letter-spacing-desktop: -2px
  hero-title-letter-spacing-tablet: -1.5px
  hero-title-letter-spacing-mobile: -1.2px
  hero-title-letter-spacing-landscape: -1px

  hero-title-margin-left-desktop: -2px
  hero-title-margin-left-tablet: 2px
  hero-title-margin-left-mobile: 2px
  hero-title-margin-left-landscape: 2px

  # ============================================================================
  # HERO IMAGE TREATMENT
  # ============================================================================

  hero-tint: rgba(55,55,55,0.50)
  hero-tint-mobile: rgba(80,80,80,0.20)
  hero-img-blur: 4px
  hero-img-blur-mobile: 0px
  hero-img-scale: 1.08
  hero-img-scale-mobile: 1.0
  hero-img-saturate: 1.02
  hero-img-saturate-mobile: 1.00
  hero-img-brightness: 0.985
  hero-img-brightness-mobile: 0.93
  hero-img-saturate-from: 1.0
  hero-img-brightness-from: 0.97

  # ============================================================================
  # WEATHER
  # ============================================================================

  weather-icon-size-mobile: 26px
  weather-icon-size-tablet: 24px
  weather-icon-size-desktop: 24px
  hemma-weather-bottom-nudge: -5px

  # ============================================================================
  # ENTITY VISUAL TOKENS
  # ============================================================================

  hemma-entity-picture-inactive-opacity: 0.98
  hemma-entity-picture-active-opacity: 1
  hemma-entity-picture-inactive-filter: brightness(.98) saturate(0.9)

  hemma-hover-overlay-opacity: 0.12
  hemma-entity-text-shadow: none
  hemma-entity-header-buffer: 220px
  hemma-entity-height-desktop: 200px
  hemma-entity-col-width-desktop: 290px
  hemma-entity-height-tablet: 160px
  hemma-entity-col-width-tablet: 220px
  hemma-entity-height-mobile: 116px
  hemma-entity-col-width-mobile: 180px
  hemma-entity-height-landscape: 120px
  hemma-entity-col-width-landscape: 160px

  # ============================================================================
  # BADGE TOKENS
  # ============================================================================

  # Global
  badge-blur: 14px
  badge-br: 9999px
  badge-active-color: rgba(255,255,255,0.85)
  badge-title-inactive: rgba(255,255,255,0.75)

  # Desktop
  badge-gap: 10px
  badge-col-gap: 4px
  badge-padding: 4px 15px 4px 9px
  badge-min-height: 50px
  badge-icon-size: 30px
  badge-font-size: 15px
  badge-btn-size: 22px

  # Tablet
  badge-gap-tablet: 10px
  badge-col-gap-tablet: 4px
  badge-padding-tablet: 3px 14px 3px 8px
  badge-min-height-tablet: 50px
  badge-icon-size-tablet: 30px
  badge-font-size-tablet: 15px
  badge-btn-size-tablet: 20px

  # Mobile
  badge-gap-mobile: 10px
  badge-col-gap-mobile: 4px
  badge-padding-mobile: 4px 12px 4px 5px
  badge-min-height-mobile: 43px
  badge-icon-size-mobile: 24px
  badge-font-size-mobile: 13px
  badge-btn-size-mobile: 18px

  # Mobile Landscape
  badge-gap-landscape: 10px
  badge-col-gap-landscape: 4px
  badge-padding-landscape: 4px 12px 4px 5px
  badge-min-height-landscape: 38px
  badge-icon-size-landscape: 24px
  badge-font-size-landscape: 12px
  badge-btn-size-landscape: 16px

  # Media badges
  badge-media-icon-size: 38px
  badge-media-icon-size-tablet: 36px
  badge-media-icon-size-mobile: 33px
  badge-media-icon-size-landscape: 28px

  badge-media-btn-size: 40px
  badge-media-btn-size-tablet: 40px
  badge-media-btn-size-mobile: 34px
  badge-media-btn-size-landscape: 30px

  badge-media-btn-icon-size: 28px
  badge-media-btn-icon-size-tablet: 24px
  badge-media-btn-icon-size-mobile: 20px
  badge-media-btn-icon-size-landscape: 18px

  badge-media-max-width-desktop: 640px
  badge-media-max-width-tablet: 520px
  badge-media-max-width-mobile: 100%

  # ============================================================================
  # HEMMA BASE PALETTE
  # ============================================================================

  hemma-color-blue:        '#007AFF'   # informational
  hemma-color-teal:        '#00c3d0'   # primary / interactive / climate active
  hemma-color-yellow:      '#FFCC00'   # warning / lights on / warm states
  hemma-color-green:       '#44e371'   # good / online / healthy / low usage
  hemma-color-green-soft:  '#67f5a0'   # nature / life (popup accents, air quality)
  hemma-color-green-plant: '#34C759'   # plant / nature / organic
  hemma-color-orange:      '#ff9230'   # caution / high usage / hot
  hemma-color-red:         '#ff4245'   # critical / danger / offline / very hot
  hemma-color-ice:         '#3cd3fe'   # cold temps / high humidity
  hemma-color-amber:       '#ffb254'   # humidity dry / warm amber
  hemma-color-deep-blue:   '#0091ff'   # extreme cold temperature
  hemma-color-deep-orange: '#ff6b30'   # battery very-low
  hemma-color-pink:        '#ff4d70'   # media / plex playing
  hemma-color-neutral:     '#CDCDCF'   # idle / inactive states
  hemma-color-purple:      '#9333ea'   # movie genre
  hemma-color-gold:        '#e5a00d'   # show/TV genre

  # ============================================================================
  # POPUP COLORS
  # ============================================================================

  hemma-popup-primary-color: var(--hemma-color-teal, #00c3d0)
  hemma-popup-yellow-color:  var(--hemma-color-yellow, #ffd600)
  hemma-popup-green-color:   var(--hemma-color-green-soft, #67f5a0)
  hemma-popup-orange-color:  var(--hemma-color-orange, #ff9230)
  hemma-popup-red-color:     var(--hemma-color-red, #ff4245)
  hemma-movie-color: var(--hemma-color-purple, #9333ea)
  hemma-show-color:  var(--hemma-color-gold, #e5a00d)

  # ============================================================================
  # BADGE / STATUS COLORS
  # ============================================================================

  # Button Card / Icon Background
  hemma-icon-circle-bg: rgba(255,255,255,0.10)

  # Light
  hemma-badge-light-color:             var(--hemma-color-yellow, #ffd600)

  # Climate / Thermostat
  hemma-badge-climate-color:           var(--hemma-color-teal, #00c3d0)
  hemma-puck-cool-color:               var(--hemma-color-teal, #00c3d0)
  hemma-puck-heat-color:               var(--hemma-color-yellow, #ffd600)

  # Temperature
  hemma-badge-climate-very-cold-color: var(--hemma-color-ice, #3cd3fe)
  hemma-badge-temp-very-cold-color:    var(--hemma-color-deep-blue, #0091ff)
  hemma-badge-temp-cool-color:         var(--hemma-color-ice, #3cd3fe)
  hemma-badge-temp-comfortable-color:  var(--hemma-color-green-soft, #67f5a0)
  hemma-badge-temp-warm-color:         var(--hemma-color-yellow, #ffd600)
  hemma-badge-temp-hot-color:          var(--hemma-color-orange, #ff9230)
  hemma-badge-temp-very-hot-color:     var(--hemma-color-red, #ff4245)

  # Air Quality
  hemma-badge-air-quality-excellent-color: var(--hemma-color-green-soft, #67f5a0)
  hemma-badge-air-quality-good-color:      var(--hemma-color-green, #44e371)
  hemma-badge-air-quality-moderate-color:  var(--hemma-color-yellow, #ffd600)
  hemma-badge-air-quality-poor-color:      var(--hemma-color-orange, #ff9230)
  hemma-badge-air-quality-bad-color:       var(--hemma-color-red, #ff4245)

  # Humidity
  hemma-badge-humidity-dry-color:  var(--hemma-color-amber, #ffb254)
  hemma-badge-humidity-high-color: var(--hemma-color-ice, #3cd3fe)

  # Presence
  hemma-badge-presence-home-color: "#49F08CD9"
  hemma-badge-presence-away-color: var(--hemma-color-yellow, #ffd600)

  # Media
  hemma-badge-media-color: var(--hemma-color-pink, #ff4d70)

  # Network
  hemma-badge-network-online-color:        var(--hemma-color-green, #44e371)
  hemma-badge-network-offline-color:       var(--hemma-color-red, #ff4245)
  hemma-badge-network-idle-color:          var(--hemma-color-neutral, #8e8e93)
  hemma-badge-network-low-color:           var(--hemma-color-green, #44e371)
  hemma-badge-network-active-color:        var(--hemma-color-yellow, #ffd600)
  hemma-badge-network-high-color:          var(--hemma-color-orange, #ff9230)
  hemma-badge-network-ping-good-color:     var(--hemma-color-green, #44e371)
  hemma-badge-network-ping-moderate-color: var(--hemma-color-yellow, #ffd600)
  hemma-badge-network-ping-bad-color:      var(--hemma-color-red, #ff4245)

  # Energy
  hemma-badge-energy-low-color:       var(--hemma-color-green, #44e371)
  hemma-badge-energy-medium-color:    var(--hemma-color-yellow, #ffd600)
  hemma-badge-energy-high-color:      var(--hemma-color-orange, #ff9230)
  hemma-badge-energy-very-high-color: var(--hemma-color-red, #ff4245)

  # Battery
  hemma-badge-battery-critical-color:  var(--hemma-color-red, #ff4245)
  hemma-badge-battery-very-low-color:  var(--hemma-color-deep-orange, #ff6b30)
  hemma-badge-battery-low-color:       var(--hemma-color-yellow, #ffd600)
  hemma-badge-battery-good-color:      var(--hemma-color-green, #44e371)

  # Plant Health
  hemma-badge-plant-healthy-color:    var(--hemma-color-green-plant, #34C759)
  hemma-badge-plant-care-color:       var(--hemma-color-yellow, #ffd600)
  hemma-badge-plant-struggling-color: var(--hemma-color-orange, #ff9230)
  hemma-badge-plant-critical-color:   var(--hemma-color-red, #ff4245)

  # ============================================================================
