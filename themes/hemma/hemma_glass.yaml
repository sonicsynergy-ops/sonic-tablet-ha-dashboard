        #root > :nth-child(8)  { --hemma-entity-anim-delay-d: 0.28s; }
        #root > :nth-child(9)  { --hemma-entity-anim-delay-d: 0.32s; }
        #root > :nth-child(10) { --hemma-entity-anim-delay-d: 0.36s; }
      }

