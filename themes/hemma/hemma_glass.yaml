        #root > :nth-child(1)  { --hemma-entity-anim-delay-d: 0s;    }
        #root > :nth-child(2)  { --hemma-entity-anim-delay-d: 0.04s; }
        #root > :nth-child(3)  { --hemma-entity-anim-delay-d: 0.08s; }
