# Plex Stream Popup
hemma_popup_plex:
  template:
    - hemma_popup_base

  tap_action:
    browser_mod:
      data:
        content: |
          [[[
            /* -------------------------------------------------------
             * Entity Resolution
             * ------------------------------------------------------- */

            const sid = variables?.session_entity || entity?.entity_id || '';

            // sensor.plex_stream_1 → sensor.plex_session_1_tautulli
            const tauEntity = variables?.tautulli_entity ||
              (sid ? sid.replace(/^(sensor\.)plex_stream_(\d+)$/, '$1plex_session_$2_tautulli') : null);

            const a = (tauEntity && states[tauEntity]?.attributes) ||
                      (sid && states[sid]?.attributes) || {};

            /* -------------------------------------------------------
             * Poster
             * ------------------------------------------------------- */

            const esc = (s) => String(s ?? '')
              .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

            const resolveUrl = (raw) => {
              if (!raw) return null;
              const s = String(raw);
              return s.startsWith('/') ? location.origin + s : s;
            };

            const posterUrl = resolveUrl(a.image_url);

            const posterHtml = posterUrl
              ? '<img src="' + esc(posterUrl) + '" loading="lazy" style="width:90px;height:135px;object-fit:cover;border-radius:9px;box-shadow:0 2px 12px rgba(0,0,0,0.32);display:block;" />'
              : '<div style="width:90px;height:135px;background:rgba(255,255,255,0.07);border-radius:9px;display:flex;align-items:center;justify-content:center;"><ha-icon icon="mdi:plex" style="--mdc-icon-size:32px;color:rgba(255,255,255,0.35);"></ha-icon></div>';

            /* -------------------------------------------------------
             * Card
             * ------------------------------------------------------- */

            const mainCard = {
              type: 'custom:button-card',
              entity: sid || tauEntity,
              triggers_update: [sid, tauEntity].filter(Boolean),
              tap_action: { action: 'none' },
              show_icon: false, show_name: false, show_label: false, show_state: false,
              styles: {
                card: [
                  { border: 'none' },
                  { 'box-shadow': 'none' },
                  { padding: '0' },
                  { '--ha-card-box-shadow': 'none' },
                  { '--ha-card-border-color': 'transparent' },
                ],
                grid: [
                  { 'grid-template-areas': '"c"' },
                  { 'grid-template-columns': '1fr' },
                ],
                custom_fields: {
                  // poster is absolute — removed from grid flow, sits over the spacer in c
                  poster: [
                    { position: 'absolute' },
                    { top: '50px' },
                    { left: '28px' },
                    { 'z-index': '2' },
                  ],
                  c: [{ 'justify-self': 'stretch' }],
                },
              },
              extra_styles: `[[[
                const eid = entity?.entity_id || '';
                const tauEid = eid.startsWith('sensor.plex_stream_')
                  ? 'sensor.plex_session_' + eid.replace('sensor.plex_stream_', '') + '_tautulli'
                  : eid;
                const a = states[tauEid]?.attributes || entity?.attributes || {};
                const progress = Math.min(100, Math.max(0, parseFloat(a.progress_percent || '0') || 0));
                const remSecs = (() => {
                  const t = String(a.stream_remaining || '');
                  if (!t) return 0;
                  const p = t.split(':').map(Number);
                  return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2] : p.length === 2 ? p[0]*60 + p[1] : 0;
                })();
                const isPlaying = (states[tauEid]?.state || '').toLowerCase() === 'playing';
                const totalSecs = (progress > 0 && progress < 100 && remSecs > 0)
                  ? remSecs / (1 - progress / 100) : 0;
                const elapsedSecs = Math.max(0, totalSecs - remSecs);
                const animPart = (isPlaying && totalSecs > 0)
                  ? \`animation: plexProgressFill \${totalSecs.toFixed(1)}s linear -\${elapsedSecs.toFixed(1)}s forwards;\`
                  : '';
                return \`
                  @keyframes plexProgressFill {
                    from { width: 0%; }
                    to { width: 100%; }
                  }
                  #plex-prog-fill { \${animPart} }
                  :host {
                    --ha-card-box-shadow: none !important;
                    --button-card-box-shadow: none !important;
                    --button-card-box-shadow-hover: none !important;
                    --button-card-padding: 0px;
                    overflow: visible !important;
                  }
                  ha-card {
                    --ha-card-background: transparent !important;
                    --card-background-color: transparent !important;
                    --ha-card-box-shadow: none !important;
                    --ha-card-border-color: transparent !important;
                    overflow: visible !important;
                    background: transparent !important;
                    backdrop-filter: none !important;
                    -webkit-backdrop-filter: none !important;
                    border: none !important;
                    border-radius: 0 !important;
                    box-shadow: none !important;
                    cursor: default !important;
                    position: relative !important;
                    padding: 0 !important;
                  }
                  #container {
                    padding: 0 !important;
                    text-align: left !important;
                    position: relative !important;
                    z-index: 2 !important;
                    overflow: visible !important;
                  }
                  ha-ripple { display: none !important; }
                  ha-card:hover { box-shadow: none !important; }
                \`;
              ]]]`,
              custom_fields: {
                poster: posterHtml,
                c: `[[[
                  /* Entity resolution */
                  const eid = entity?.entity_id || '';
                  const tauEid = eid.startsWith('sensor.plex_stream_')
                    ? 'sensor.plex_session_' + eid.replace('sensor.plex_stream_', '') + '_tautulli'
                    : eid;
                  const a = states[tauEid]?.attributes || entity?.attributes || {};

                  /* Helpers */
                  const esc = (s) => String(s ?? '')
                    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

                  /* Media Data */
                  const mediaType = (a.media_type || '').toLowerCase();
                  const isEpisode = mediaType === 'episode';
                  const showTitle = isEpisode
                    ? (a.grandparent_title || a.full_title || 'Unknown')
                    : (a.title || a.full_title || 'Unknown');
                  const episodeTitle = isEpisode ? (a.title || '') : '';
                  const seasonEpisode = isEpisode
                    ? 'S' + (a.parent_media_index || '?') + ' \xb7 E' + (a.media_index || '?')
                    : (a.year ? String(a.year) : '');

                  const progress = Math.min(100, Math.max(0, parseFloat(a.progress_percent || '0') || 0));

                  const remSecs = (() => {
                    const t = String(a.stream_remaining || '');
                    if (!t) return null;
                    const p = t.split(':').map(Number);
                    return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2]
                         : p.length === 2 ? p[0]*60 + p[1] : null;
                  })();
                  const timeLeft = (remSecs == null || remSecs <= 0) ? ''
                    : remSecs < 90   ? 'Less than 1 min left'
                    : remSecs < 3600 ? Math.floor(remSecs/60) + ' min left'
                    : Math.floor(remSecs/3600) + ' hr ' + Math.floor((remSecs%3600)/60) + ' min left';

                  /* Video / Audio Formatting */
                  const fmtVCodec = (c) => {
                    const m = {h264:'H.264',hevc:'H.265',h265:'H.265',av1:'AV1',vp9:'VP9',vc1:'VC1',mpeg4:'MPEG-4',mpeg2video:'MPEG-2'};
                    return m[(c||'').toLowerCase()] || (c||'').toUpperCase();
                  };
                  const fmtACodec = (c) => {
                    const m = {dts:'DTS',dca:'DTS','dts-hd ma':'DTS-HD MA','dts-hd':'DTS-HD',eac3:'EAC3','e-ac-3':'EAC3',ac3:'AC3',aac:'AAC',mp3:'MP3',truehd:'TrueHD',flac:'FLAC',opus:'Opus',pcm:'PCM'};
                    return m[(c||'').toLowerCase()] || (c||'').toUpperCase();
                  };
                  const fmtCh = (l) => {
                    const m = {'7.1':'7.1','5.1':'5.1','5.1(side)':'5.1','5.1(back)':'5.1',stereo:'Stereo','2.0':'Stereo',mono:'Mono','1.0':'Mono'};
                    return m[(l||'').toLowerCase()] || l || '';
                  };
                  const fmtRes = (r) => { const m = {'4k':'4K','8k':'8K','2k':'2K'}; return m[(r||'').trim().toLowerCase()] || (r||''); };
                  const fmtVideoDR = (dr) => {
                    const d = (dr||'').toLowerCase();
                    if (!d) return '';
                    if (d.includes('dolby vision') && d.includes('hdr10+')) return 'Dolby Vision \xb7 HDR10+';
                    if (d.includes('dolby vision') && d.includes('hdr10')) return 'Dolby Vision \xb7 HDR10';
                    if (d.includes('dolby vision')) return 'Dolby Vision';
                    if (d.includes('hdr10+')) return 'HDR10+';
                    if (d.includes('hdr10')) return 'HDR10';
                    if (d.includes('hdr')) return 'HDR';
                    if (d === 'sdr') return 'SDR';
                    return '';
                  };
                  const fmtAudioExtra = (prof) => {
                    const p = (prof||'').toLowerCase();
                    if (!p) return '';
                    if (p.includes('atmos')) return 'Dolby Atmos';
                    if (p.includes('truehd')) return 'TrueHD';
                    if (p.includes('dts:x') || p.includes('dts-x')) return 'DTS:X';
                    if (p.includes('auro-3d')) return 'Auro-3D';
                    return '';
                  };

                  const videoRes = fmtRes(a.stream_video_full_resolution || (a.video_resolution ? a.video_resolution+'p' : ''));
                  const videoCodec = fmtVCodec(a.stream_video_codec || a.video_codec || '');
                  const vBrKbps = parseInt(a.stream_video_bitrate || '0');
                  const videoBitrate = vBrKbps > 0 ? (vBrKbps >= 1000 ? (vBrKbps/1000).toFixed(1)+' Mbps' : vBrKbps+' Kbps') : '';
                  const videoDR = fmtVideoDR(a.stream_video_dynamic_range || a.video_dynamic_range || '');
                  const hasDV = videoDR.startsWith('Dolby Vision');
                  const videoDVExtra = hasDV ? 'Dolby Vision' : '';
                  const videoDRLine = hasDV ? videoDR.replace('Dolby Vision \xb7 ', '').replace('Dolby Vision', '').trim() : videoDR;
                  const videoStr = [videoRes, videoDRLine, videoCodec, videoBitrate].filter(Boolean).join(' \xb7 ');

                  const audioLang = a.stream_audio_language || a.audio_language || '';
                  const audioCodec = fmtACodec(a.stream_audio_codec || a.audio_codec || '');
                  const audioCh = fmtCh(a.stream_audio_channel_layout || a.audio_channel_layout || '');
                  const audioStr = [audioLang, audioCodec, audioCh].filter(Boolean).join(' \xb7 ');
                  const audioExtra = fmtAudioExtra(a.audio_profile || '');

                  /* Transcode Chips — Video */
                  const tdRaw = (a.transcode_decision || a.stream_video_decision || '').toLowerCase();
                  const tdLabel = tdRaw === 'direct play'   ? 'Direct Play'
                    : tdRaw === 'direct stream' ? 'Direct Stream'
                    : tdRaw === 'copy'          ? 'Direct Stream'
                    : tdRaw === 'transcode'     ? 'Transcode'
                    : tdRaw ? tdRaw.replace(/\b\w/g, c => c.toUpperCase()) : '';
                  const tdColor = tdRaw === 'direct play' || tdRaw === 'copy'
                    ? 'var(--hemma-popup-primary-color,#00c3d0)'
                    : tdRaw === 'direct stream' ? 'var(--hemma-popup-yellow-color,#ffd600)'
                    : tdRaw === 'transcode'     ? 'var(--hemma-popup-orange-color,#ff9230)'
                    : 'rgba(255,255,255,0.4)';

                  /* Transcode Chips — Audio */
                  const adRaw = (a.stream_audio_decision || a.audio_decision || '').toLowerCase();
                  const adLabel = adRaw === 'direct play'   ? 'Direct Play'
                    : adRaw === 'copy'          ? 'Direct Stream'
                    : adRaw === 'direct stream' ? 'Direct Stream'
                    : adRaw === 'transcode'     ? 'Transcode'
                    : adRaw ? adRaw.replace(/\b\w/g, c => c.toUpperCase()) : '';
                  const adColor = adRaw === 'direct play'
                    ? 'var(--hemma-popup-primary-color,#00c3d0)'
                    : adRaw === 'copy' || adRaw === 'direct stream'
                    ? 'var(--hemma-popup-yellow-color,#ffd600)'
                    : adRaw === 'transcode'     ? 'var(--hemma-popup-orange-color,#ff9230)'
                    : 'rgba(255,255,255,0.4)';

                  /* Media State Chip */
                  const rawState = (states[tauEid]?.state || entity?.state || '').toLowerCase();
                  const stateLabel = rawState === 'playing'   ? 'Playing'
                    : rawState === 'paused'     ? 'Paused'
                    : rawState === 'buffering'  ? 'Buffering'
                    : rawState === 'stopped'    ? 'Stopped'
                    : rawState ? rawState.replace(/\b\w/g, c => c.toUpperCase()) : '';
                  const stateColor = rawState === 'playing'   ? 'var(--hemma-badge-network-online-color,#44e371)'
                    : rawState === 'paused'     ? 'var(--hemma-popup-yellow-color,#ffd600)'
                    : rawState === 'buffering'  ? 'var(--hemma-popup-orange-color,#ff9230)'
                    : 'rgba(255,255,255,0.5)';

                  /* User */
                  const userName = a.user_friendly_name || a.user || '';
                  const userThumb = a.user_thumb || '';
                  const deviceStr = [a.device || '', a.player || a.platform || ''].filter(Boolean).join(' → ');

                  /* HTML Fragments */
                  const chip = (label, color) => label
                    ? '<span style="flex-shrink:0;font-size:11px;font-weight:600;color:' + color + ';background:color-mix(in srgb,' + color + ' 12%,transparent);border:1px solid color-mix(in srgb,' + color + ' 35%,transparent);border-radius:999px;padding:4px 7px;white-space:nowrap;font-family:var(--primary-font-family,system-ui);letter-spacing:0.01em;">' + esc(label) + '</span>'
                    : '';

                  const thumbUrl = userThumb.replace(/[()'" ]/g, encodeURIComponent);
                  const avatarHtml = userThumb
                    ? '<div style="width:32px;height:32px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.15);overflow:hidden;background:rgba(255,255,255,0.1) url(' + thumbUrl + ') center/cover no-repeat;"></div>'
                    : '<div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.1);flex-shrink:0;display:flex;align-items:center;justify-content:center;"><ha-icon icon="mdi:account" style="--mdc-icon-size:18px;color:rgba(255,255,255,0.45);"></ha-icon></div>';

                  const tdChip = chip(tdLabel, tdColor);
                  const adChip = chip(adLabel, adColor);
                  const stateChip = stateLabel
                    ? '<span style="position:absolute;top:20px;right:20px;z-index:10;font-size:15px;font-weight:500;color:' + stateColor + ';background:linear-gradient(135deg,color-mix(in srgb,' + stateColor + ' 18%,transparent) 0%,color-mix(in srgb,' + stateColor + ' 12%,transparent) 100%);border:1px solid color-mix(in srgb,' + stateColor + ' 40%,transparent);border-radius:999px;padding:8px 15px;white-space:nowrap;font-family:var(--primary-font-family,system-ui);">' + esc(stateLabel) + '</span>'
                    : '';

                  const lbl = 'font-size:13px;color:rgba(255,255,255,0.42);font-weight:500;width:48px;flex-shrink:0;text-align:left;padding-top:2px;';
                  const dvd = 'height:1px;background:rgba(255,255,255,0.09);';
                  const row = 'display:flex;align-items:flex-start;gap:12px;padding:16px 0;';
                  const subLineColor = 'rgba(255,255,255,0.52)';
                  const audioExtraLine = audioExtra
                    ? '<span style="font-size:12px;color:' + subLineColor + ';">' + esc(audioExtra) + '</span>'
                    : '';
                  const videoExtraLine = videoDVExtra
                    ? '<span style="font-size:12px;color:' + subLineColor + ';">' + esc(videoDVExtra) + '</span>'
                    : '';

                  return '<div style="text-align:left;position:relative;">'
                    + stateChip
                    + '<div style="padding:50px 28px 14px 28px;display:flex;align-items:center;">'
                      + '<div style="width:90px;height:135px;flex-shrink:0;"></div>'
                      + '<div style="padding-left:20px;display:flex;flex-direction:column;gap:6px;min-width:0;flex:1;text-align:left;">'
                        + '<div style="font-size:20px;font-weight:700;color:#fff;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(showTitle) + '</div>'
                        + (episodeTitle ? '<div style="font-size:14px;font-weight:500;color:rgba(255,255,255,0.78);line-height:1.35;word-break:break-word;">' + esc(episodeTitle) + '</div>' : '')
                        + (seasonEpisode ? '<div style="font-size:13px;color:rgba(255,255,255,0.5);font-weight:500;">' + esc(seasonEpisode) + '</div>' : '')
                        + (timeLeft ? '<div style="font-size:13px;color:rgba(255,255,255,0.42);margin-top:1px;">' + esc(timeLeft) + '</div>' : '')
                      + '</div>'
                    + '</div>'
                    + '<div style="padding:8px 28px 8px;">'
                      + '<div style="height:7px;background:rgba(255,255,255,0.12);border-radius:999px;position:relative;overflow:hidden;">'
                        + '<div id="plex-prog-fill" style="position:absolute;inset:0 auto 0 0;width:' + progress.toFixed(1) + '%;background:linear-gradient(90deg,#D28512,#e5a00d 55%,#F2BC1A);border-radius:999px;"></div>'
                      + '</div>'
                    + '</div>'
                    + '<div style="padding:0 28px 8px 28px;text-align:left;">'
                      + '<div style="' + row + '">'
                        + '<span style="' + lbl + '">Video</span>'
                        + '<div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;">'
                          + '<div style="display:flex;align-items:center;gap:8px;min-width:0;">'
                            + '<span style="flex:1;min-width:0;font-size:14px;color:rgba(255,255,255,0.9);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(videoStr || '—') + '</span>'
                            + tdChip
                          + '</div>'
                          + videoExtraLine
                        + '</div>'
                      + '</div>'
                      + '<div style="' + dvd + '"></div>'
                      + '<div style="' + row + '">'
                        + '<span style="' + lbl + '">Audio</span>'
                        + '<div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;">'
                          + '<div style="display:flex;align-items:center;gap:8px;min-width:0;">'
                            + '<span style="flex:1;min-width:0;font-size:14px;color:rgba(255,255,255,0.9);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(audioStr || '—') + '</span>'
                            + adChip
                          + '</div>'
                          + audioExtraLine
                        + '</div>'
                      + '</div>'
                      + '<div style="' + dvd + '"></div>'
                      + '<div style="display:flex;align-items:center;gap:12px;padding:16px 0;">'
                        + '<div style="width:48px;display:flex;align-items:center;justify-content:flex-start;flex-shrink:0;">'
                          + avatarHtml
                        + '</div>'
                        + '<div style="min-width:0;flex:1;text-align:left;">'
                          + '<div style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(userName || '—') + '</div>'
                          + (deviceStr ? '<div style="font-size:12px;color:rgba(255,255,255,0.42);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(deviceStr) + '</div>' : '')
                        + '</div>'
                      + '</div>'
                    + '</div>'
                  + '</div>';
                ]]]`,
              },
            };

            return mainCard;
          ]]]
        popup_styles:
          - style: all
            styles: |
              ha-adaptive-dialog, ha-dialog {
                --dialog-surface-margin-top: 100px;
                --dialog-content-padding: 0px;
              }
              @media (max-width: 767px) {
                ha-adaptive-dialog, ha-dialog {
                  --dialog-surface-margin-top: 0px;
                }
              }
              @media (min-width: 1250px) {
                ha-adaptive-dialog, ha-dialog {
                  --dialog-surface-margin-top: 150px;
                }
              }

  icon_tap_action:
    haptic: light
    action: more-info
