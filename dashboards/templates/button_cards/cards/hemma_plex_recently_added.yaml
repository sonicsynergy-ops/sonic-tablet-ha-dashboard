hemma_plex_recently_added:
  template:
    - hemma_entity
    - hemma_popup_recently_added

  variables:
    icon: plex

  triggers_update:
    - sensor.plex_recently_added_count
    - sensor.recently_added_movies
    - sensor.recently_added_tv

  hold_action:
    action: more-info
    entity: sensor.plex_recently_added_count

  state_display: |
    [[[
      const moviesData = states['sensor.recently_added_movies']?.attributes?.data;
      const tvData     = states['sensor.recently_added_tv']?.attributes?.data;
      const rawM = Array.isArray(moviesData) ? moviesData.slice(1).filter(i => i && i.title) : [];
      const rawT = Array.isArray(tvData)     ? tvData.slice(1).filter(i => i && i.title)     : [];
      const cutoff = Date.now() - 3 * 24 * 60 * 60 * 1000;
      const count = [...rawM, ...rawT].filter(i => i.airdate && new Date(i.airdate).getTime() >= cutoff).length;
      if (count <= 0) return 'Up to date';
      return count === 1 ? '1 Added' : `${count} Added`;
    ]]]

  state:
    - operator: template
      value: |
        [[[
          const moviesData = states['sensor.recently_added_movies']?.attributes?.data;
          const tvData     = states['sensor.recently_added_tv']?.attributes?.data;
          const rawM = Array.isArray(moviesData) ? moviesData.slice(1).filter(i => i && i.title) : [];
          const rawT = Array.isArray(tvData)     ? tvData.slice(1).filter(i => i && i.title)     : [];
          const cutoff = Date.now() - 3 * 24 * 60 * 60 * 1000;
          const count = [...rawM, ...rawT].filter(i => i.airdate && new Date(i.airdate).getTime() >= cutoff).length;
          return count > 0;
        ]]]
      styles:
        card:
          - "--hemma-active-overlay-opacity": "1"
          - "--hemma-active-overlay-dur": "0s"
          - --hemma-entity-top-gradient: none
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
        name:
          - color: var(--hemma-entity-name-active, var(--primary-text-color))
        state:
          - color: var(--hemma-entity-state-active-color)
        img_cell:
          - opacity: "1 !important"
          - filter: none !important
          - background: "var(--hemma-color-yellow, #e5a00d) !important"
        entity_picture:
          - opacity: "1 !important"
          - filter: none !important

  extra_styles: |
    #img-cell {
      position: relative;
      border-radius: 50% !important;
      background: var(--hemma-icon-circle-bg, rgba(255,255,255,0.10)) !important;
      width: 44px !important;
      height: 44px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      overflow: hidden !important;
    }
    #img-cell::before { opacity: 0 !important; }
    #img-cell img {
      width: 50% !important;
      height: 50% !important;
      max-width: 50% !important;
      max-height: 50% !important;
      object-fit: contain !important;
      flex: none !important;
    }
    #img-cell ha-icon {
      --mdc-icon-size: 22px !important;
      flex: none !important;
      color: rgba(255,255,255,1.0) !important;
    }
    #icon { color: rgba(255,255,255,1.0) !important; }
    @media (max-width: 767px) and (orientation: portrait) {
      #img-cell { width: 38px !important; height: 38px !important; }
      #img-cell ha-icon { --mdc-icon-size: 19px !important; }
    }
    @media (hover: hover) {
      #img-cell:hover { filter: brightness(1.15); transform: scale(1.03); transition: filter 0.15s ease, transform 0.15s ease; }
    }
    @media (hover: none) {
      #img-cell:active { filter: brightness(1.15); transform: scale(1.03); }
    }
