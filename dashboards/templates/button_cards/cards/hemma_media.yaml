# Media Card
hemma_media:
  show_empty: false
  template:
    - hemma_entity

  variables:
    icon: ''

  triggers_update:
    - sensor.youtube_watching

  show_last_changed: false
  show_entity_picture: true
  show_icon: false

  entity_picture: >
    [[[
      const icon = variables?.icon;
      if (icon) return `/local/hemma/icons/${icon}.svg`;
      const state = String(entity?.state || "").toLowerCase();
      const appName = String(entity?.attributes?.app_name || "").toLowerCase();
      if (state === "playing" && appName.includes("youtube")) {
        const thumb = states['sensor.youtube_watching']?.attributes?.thumbnail;
        if (thumb) return thumb;
      }
      return entity?.attributes?.entity_picture || '/local/hemma/icons/speaker.svg';
    ]]]

  state_display: |
    [[[
      const sRaw = String(entity?.state || "");
      const s    = sRaw.toLowerCase();
      const a    = entity?.attributes || {};
      const cap  = (x) => (x ? x.charAt(0).toUpperCase() + x.slice(1) : "");
      const esc  = (t) => String(t ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .trim();
      if (s === "playing") {
        const id       = entity?.entity_id || "";
        const friendly = (a.friendly_name || "").toLowerCase();
        const type   = String(a.media_content_type || "").toLowerCase();
        const title  = (a.media_title || a.title || "").trim();
        const artist =
          (a.media_artist || a.artist || a.media_album_artist || "").trim();
        const app    = (a.app_name || "").trim();
        const source = (a.source || a.media_channel || "").trim();
        const isMusic =
          type === "music" ||
          id.includes("spotify") ||
          (!!artist && !["movie","video","tvshow"].includes(type));
        let label = "";
        if (isMusic) {
          if (artist && title) label = `${artist} - ${title}`;
          else label = title || artist || app || source || cap(s);
        } else {
          label = title || app || source || cap(s);
        }
        const isSonos = id.includes("sonos") || friendly.includes("sonos");
        const bareInputs = ["tv","hdmi","arc","hdmi arc","optical","line-in","line in"];
        let looksLikeBareInput = false;
        if (isSonos) {
          const tLow = title.toLowerCase();
          const sLow = source.toLowerCase();
          if (
            title && (
              bareInputs.includes(tLow) ||
              (source && tLow === sLow)
            )
          ) {
            looksLikeBareInput = true;
          }
        }
        const hasRichMeta =
          !!(a.media_artist || a.media_album_artist || a.media_series_title || a.media_episode_title);
        const mediaTypes = ["music","movie","video","tvshow"];
        const fromRichApp =
          /youtube|plex|netflix|hulu|disney|max|prime|spotify|apple tv|apple music|paramount|peacock/i
            .test(app);
        const isRichPlayback = !looksLikeBareInput && (
          hasRichMeta ||
          mediaTypes.includes(type) ||
          fromRichApp
        );
        if (!isRichPlayback) return esc(label) || cap(s);
        return `<span class="hemma-media-state">${esc(label)}</span>`;
      }
      if (["off","idle","paused","standby","unavailable","unknown"].includes(s)) {
        return cap(s);
      }
      return s ? cap(s) : "Off";
    ]]]


  tap_action:
    action: more-info
  hold_action:
    action: more-info

  icon_tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  styles:
    grid:
      - grid-template-areas: |
          "i"
          "."
          "n"
          "s"
      - grid-template-columns: 1fr
      - grid-template-rows: min-content 1fr min-content min-content
      - row-gap: 4px
      - justify-items: start
      - align-items: start

    card:
      - background-size: cover
      - background-position: center
      - --hemma-media-artwork-overlay: |
          [[[
            if (String(entity?.state || "").toLowerCase() !== "playing") return "var(--hemma-active-overlay-opacity, 0)";
            const a = entity?.attributes || {};
            const id = entity?.entity_id || '';
            const type = String(a.media_content_type || '').toLowerCase();
            const app = String(a.app_name || '').trim();
            const title = (a.media_title || a.title || '').trim();
            const source = (a.source || a.media_channel || '').trim();
            const isSonos = id.includes('sonos') || (a.friendly_name || '').toLowerCase().includes('sonos');
            const bareInputs = ['tv','hdmi','arc','hdmi arc','optical','line-in','line in'];
            let looksLikeBareInput = false;
            if (isSonos && title) {
              const tLow = title.toLowerCase();
              looksLikeBareInput = bareInputs.includes(tLow) || (!!source && tLow === source.toLowerCase());
            }
            const isYouTube = app.toLowerCase().includes('youtube');
            const pic = isYouTube
              ? (states['sensor.youtube_watching']?.attributes?.thumbnail || a.entity_picture || '')
              : (a.entity_picture || '');
            const hasRichMeta = !!(a.media_series_title || a.media_episode_title);
            const fromRichApp = /youtube|plex|netflix|hulu|disney|max|prime|spotify|apple tv|apple music|paramount|peacock/i.test(app);
            const hasArtwork = !!pic && !looksLikeBareInput && (hasRichMeta || ['music','movie','video','tvshow'].includes(type) || fromRichApp);
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            return hasArtwork ? (isMobile ? "0.3" : "0.4") : "var(--hemma-active-overlay-opacity, 0)";
          ]]]
      - --hemma-media-name-color: |
          [[[
            const a = entity?.attributes || {};
            const id = entity?.entity_id || '';
            const s = String(entity?.state || '').toLowerCase();
            const activeStates = ['on','open','opening','playing','cleaning','returning','cool','heat','washing','rinsing','spinning','drying','running','active','problem'];
            if (!activeStates.includes(s)) return 'var(--hemma-entity-name)';
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            if (s !== 'playing') return 'var(--hemma-entity-name-active)';
            const type = String(a.media_content_type || '').toLowerCase();
            const app = String(a.app_name || '').trim();
            const title = (a.media_title || a.title || '').trim();
            const source = (a.source || a.media_channel || '').trim();
            const isSonos = id.includes('sonos') || (a.friendly_name || '').toLowerCase().includes('sonos');
            const bareInputs = ['tv','hdmi','arc','hdmi arc','optical','line-in','line in'];
            let looksLikeBareInput = false;
            if (isSonos && title) {
              const tLow = title.toLowerCase();
              looksLikeBareInput = bareInputs.includes(tLow) || (!!source && tLow === source.toLowerCase());
            }
            const isYouTube = app.toLowerCase().includes('youtube');
            const pic = isYouTube
              ? (states['sensor.youtube_watching']?.attributes?.thumbnail || a.entity_picture || '')
              : (a.entity_picture || '');
            const hasRichMeta = !!(a.media_series_title || a.media_episode_title);
            const fromRichApp = /youtube|plex|netflix|hulu|disney|max|prime|spotify|apple tv|apple music|paramount|peacock/i.test(app);
            const hasArtwork = !!pic && !looksLikeBareInput && (hasRichMeta || ['music','movie','video','tvshow'].includes(type) || fromRichApp);
            if (hasArtwork) return 'rgba(255,255,255,0.95)';
            return 'var(--hemma-entity-name-active)';
          ]]]
      - --hemma-media-state-color: |
          [[[
            const a = entity?.attributes || {};
            const id = entity?.entity_id || '';
            const s = String(entity?.state || '').toLowerCase();
            const activeStates = ['on','open','opening','playing','cleaning','returning','cool','heat','washing','rinsing','spinning','drying','running','active','problem'];
            if (!activeStates.includes(s)) return 'var(--hemma-entity-state)';
            const isMobile = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
            if (s !== 'playing') return 'var(--hemma-entity-state-active)';
            const type = String(a.media_content_type || '').toLowerCase();
            const app = String(a.app_name || '').trim();
            const title = (a.media_title || a.title || '').trim();
            const source = (a.source || a.media_channel || '').trim();
            const isSonos = id.includes('sonos') || (a.friendly_name || '').toLowerCase().includes('sonos');
            const bareInputs = ['tv','hdmi','arc','hdmi arc','optical','line-in','line in'];
            let looksLikeBareInput = false;
            if (isSonos && title) {
              const tLow = title.toLowerCase();
              looksLikeBareInput = bareInputs.includes(tLow) || (!!source && tLow === source.toLowerCase());
            }
            const isYouTube = app.toLowerCase().includes('youtube');
            const pic = isYouTube
              ? (states['sensor.youtube_watching']?.attributes?.thumbnail || a.entity_picture || '')
              : (a.entity_picture || '');
            const hasRichMeta = !!(a.media_series_title || a.media_episode_title);
            const fromRichApp = /youtube|plex|netflix|hulu|disney|max|prime|spotify|apple tv|apple music|paramount|peacock/i.test(app);
            const hasArtwork = !!pic && !looksLikeBareInput && (hasRichMeta || ['music','movie','video','tvshow'].includes(type) || fromRichApp);
            if (hasArtwork) return 'rgba(255,255,255,0.80)';
            return 'var(--hemma-entity-state-active)';
          ]]]
      - --hemma-media-icon-bg: |
          [[[
            const a = entity?.attributes || {};
            const id = entity?.entity_id || '';
            if (entity?.state !== 'playing') return 'var(--hemma-icon-circle-bg, rgba(255,255,255,0.10))';
            const type = String(a.media_content_type || '').toLowerCase();
            const app = String(a.app_name || '').trim();
            const title = (a.media_title || a.title || '').trim();
            const source = (a.source || a.media_channel || '').trim();
            const isSonos = id.includes('sonos') || (a.friendly_name || '').toLowerCase().includes('sonos');
            const bareInputs = ['tv','hdmi','arc','hdmi arc','optical','line-in','line in'];
            let looksLikeBareInput = false;
            if (isSonos && title) {
              const tLow = title.toLowerCase();
              looksLikeBareInput = bareInputs.includes(tLow) || (!!source && tLow === source.toLowerCase());
            }
            const isYouTube = app.toLowerCase().includes('youtube');
            const pic = isYouTube
              ? (states['sensor.youtube_watching']?.attributes?.thumbnail || a.entity_picture || '')
              : (a.entity_picture || '');
            const hasRichMeta = !!(a.media_series_title || a.media_episode_title);
            const fromRichApp = /youtube|plex|netflix|hulu|disney|max|prime|spotify|apple tv|apple music|paramount|peacock/i.test(app);
            const hasArtwork = !!pic && !looksLikeBareInput && (hasRichMeta || ['music','movie','video','tvshow'].includes(type) || fromRichApp);
            return hasArtwork ? 'rgba(255,255,255,0.15)' : 'var(--hemma-icon-color-current)';
          ]]]
      - background-image: |
          [[[
            if (String(entity?.state || "").toLowerCase() !== "playing") return "none";
            const a = entity?.attributes || {};
            const id = entity?.entity_id || '';
            const type = String(a.media_content_type || '').toLowerCase();
            const app = String(a.app_name || '').trim();
            const title = (a.media_title || a.title || '').trim();
            const source = (a.source || a.media_channel || '').trim();
            const isSonos = id.includes('sonos') || (a.friendly_name || '').toLowerCase().includes('sonos');
            const bareInputs = ['tv','hdmi','arc','hdmi arc','optical','line-in','line in'];
            let looksLikeBareInput = false;
            if (isSonos && title) {
              const tLow = title.toLowerCase();
              looksLikeBareInput = bareInputs.includes(tLow) || (!!source && tLow === source.toLowerCase());
            }
            const isYouTube = app.toLowerCase().includes('youtube');
            const pic = isYouTube
              ? (states['sensor.youtube_watching']?.attributes?.thumbnail || a.entity_picture || '')
              : (a.entity_picture || '');
            const hasRichMeta = !!(a.media_series_title || a.media_episode_title);
            const fromRichApp = /youtube|plex|netflix|hulu|disney|max|prime|spotify|apple tv|apple music|paramount|peacock/i.test(app);
            const hasArtwork = !!pic && !looksLikeBareInput && (hasRichMeta || ['music','movie','video','tvshow'].includes(type) || fromRichApp);
            if (!hasArtwork) return "none";
            const path = pic.startsWith("/") ? `${window.location.origin}${pic}` : pic;
            return `linear-gradient(rgba(70, 70, 70, 0.7), rgba(70, 70, 70, 0.7)), url('${path}')`;
          ]]]

    name:
      - grid-area: n
      - align-self: end
      - z-index: 2

    state:
      - grid-area: s
      - align-self: start
      - z-index: 2
      - white-space: nowrap
      - overflow: hidden
      - text-overflow: ellipsis

  card_mod:
    style: |
      ha-card::after {
        opacity: var(--hemma-media-artwork-overlay) !important;
        transition: opacity var(--hemma-active-overlay-dur, .40s) ease !important;
      }
      @media (hover: hover) {
        :host(:hover) ha-card::after {
          transition: opacity .18s ease !important;
        }
        :host(:hover) ha-card {
          --hemma-active-overlay-opacity: var(--hemma-hover-overlay-opacity, 0.10);
        }
      }

  extra_styles: |
    #name { color: var(--hemma-media-name-color, rgba(255,255,255,0.9)) !important; }
    #state { color: var(--hemma-media-state-color, rgba(255,255,255,0.65)) !important; }
    #img-cell {
      position: relative;
      border-radius: 50% !important;
      background: var(--hemma-media-icon-bg, var(--hemma-icon-circle-bg, rgba(255,255,255,0.10))) !important;
      width: 44px !important;
      height: 44px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      overflow: hidden !important;
    }
    #img-cell::before { opacity: 0 !important; }
    #img-cell img {
      width: 68% !important;
      height: 68% !important;
      max-width: 68% !important;
      max-height: 68% !important;
      object-fit: contain !important;
      flex: none !important;
    }
    #img-cell ha-icon {
      --mdc-icon-size: 26px !important;
      flex: none !important;
      color: rgba(255,255,255,1.0) !important;
    }
    #icon { color: rgba(255,255,255,1.0) !important; }
    @media (max-width: 767px) and (orientation: portrait) {
      #img-cell { width: 38px !important; height: 38px !important; }
      #img-cell ha-icon { --mdc-icon-size: 23px !important; }
      #toggle { filter: invert(var(--hemma-toggle-invert, 0)); }
    }
    @media (hover: hover) {
      #img-cell:hover { filter: brightness(1.15); transform: scale(1.03); transition: filter 0.15s ease, transform 0.15s ease; }
    }
    @media (hover: none) {
      #img-cell:active { filter: brightness(1.15); transform: scale(1.03); }
    }
