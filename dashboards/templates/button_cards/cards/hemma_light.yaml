hemma_light:
  template:
    - hemma_entity

  show_icon: false
  show_last_changed: false

  state_display: >
    [[[
      const expand = (eid, seen = new Set()) => {
        if (!eid || seen.has(eid)) return [];
        seen.add(eid);

        const st = states[eid];
        if (!st) return [];

        const members = st.attributes?.entity_id;
        if (Array.isArray(members)) {
          return members.flatMap(m => expand(m, seen));
        }

        return [eid];
      };

      const root = entity?.entity_id;
      const all = [...new Set(expand(root))].filter(eid => eid.startsWith("light."));
      const onCount = all.filter(eid => states[eid]?.state === "on").length;

      return onCount > 0 ? `${onCount} On` : "Off";
    ]]]

  variables:
    icon: light
    show_toggle: true
    toggle_service: script.turn_on
    toggle_service_data: |
      [[[
        return {
          entity_id: 'script.hemma_light_smart_toggle',
          variables: {
            light_entity: entity.entity_id
          }
        };
      ]]]

  hold_action: &light_popup
    action: |
      [[[
        const isMobile = window.matchMedia('(max-width: 767px)').matches;
        const hasBrowserMod = typeof window.browser_mod !== 'undefined';
        return (isMobile || !hasBrowserMod) ? 'more-info' : 'fire-dom-event';
      ]]]
    entity: '[[[ return entity.entity_id ]]]'
    browser_mod:
      service: browser_mod.popup
      data:
        title: ""
        style: |
          backdrop-filter: none !important;
          box-shadow: none !important;
          -webkit-backdrop-filter: none !important;
          --popup-min-width: 800px;
          --ha-card-background: transparent;
          --ha-card-box-shadow: none !important;
          --button-card-box-shadow-hover: none !important;
          --ha-card-backdrop-filter: none;
          --ha-card-backdrop-filter-hover: none;
          --dialog-box-shadow: var(--hemma-dialog-shadow) !important;
        popup_styles:
          - style: all
            styles: |
              ha-dialog .content .container,
              ha-dialog .container {
                padding: 28px 10px 16px 10px !important;
              }
        content:
          type: custom:layout-card
          layout_type: custom:grid-layout
          layout:
            grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.05fr)
            grid-template-rows: auto
            grid-template-areas: |
              "main list"
            column-gap: 18px
            row-gap: 18px
          cards:
            - type: custom:more-info-card
              view_layout:
                grid-area: main
              entity: '[[[ return entity.entity_id ]]]'
              card_mod:
                style:
                  .: |
                    :host {
                      --ha-card-background: transparent !important;
                      --ha-card-box-shadow: none !important;
                      --ha-card-backdrop-filter: none !important;
                      --button-card-box-shadow-hover: none !important;
                    }
                    ha-card,
                    ha-card:hover,
                    ha-card:focus-within,
                    ha-card:active {
                      background: transparent !important;
                      border: none !important;
                      box-shadow: none !important;
                      backdrop-filter: none !important;
                      -webkit-backdrop-filter: none !important;
                      filter: none !important;
                      --ha-card-background: transparent !important;
                      --ha-card-box-shadow: none !important;
                      --ha-card-backdrop-filter: none !important;
                      --button-card-box-shadow-hover: none !important;
                    }
                    state-card-content,
                    div.action {
                      display: none !important;
                    }
                  $: |
                    h1.card-header {
                      text-align: center !important;
                    }
                  more-info-content $: |
                    hui-section,
                    hui-grid-section {
                      display: none !important;
                    }

            - type: vertical-stack
              view_layout:
                grid-area: list
              card_mod:
                style: |
                  ha-card,
                  ha-card:hover,
                  ha-card:focus-within,
                  ha-card:active {
                    background: transparent !important;
                    border: none !important;
                    box-shadow: none !important;
                    backdrop-filter: none !important;
                    -webkit-backdrop-filter: none !important;
                    overflow-y: auto !important;
                    filter: none !important;
                  }
              cards: |
                [[[
                  const expand = (eid, seen = new Set()) => {
                    if (!eid || seen.has(eid)) return [];
                    seen.add(eid);

                    const s = states[eid];
                    if (!s) return [];

                    const members = s.attributes?.entity_id;
                    return Array.isArray(members)
                      ? members.flatMap(m => expand(m, seen))
                      : [eid];
                  };

                  if (!entity) return [];

                  const lights = [...new Set(expand(entity.entity_id))]
                    .filter((eid) => eid.startsWith('light.') && eid !== entity.entity_id);

                  return lights.map((eid) => ({
                    type: 'custom:mushroom-light-card',
                    entity: eid,
                    fill_container: false,
                    primary_info: 'name',
                    secondary_info: 'state',
                    icon_type: 'icon',
                    use_light_color: true,
                    show_brightness_control: true,
                    show_color_temp_control: true,
                    show_color_control: true,
                    collapsible_controls: false,
                    layout: 'horizontal',
                    tap_action: { action: 'toggle' },
                    hold_action: { action: 'more-info' },
                    double_tap_action: { action: 'none' },
                    card_mod: {
                      style: `
                        ha-card {
                          --ha-card-box-shadow: none !important;
                          --button-card-box-shadow: none !important;
                          --button-card-box-shadow-hover: none !important;
                          background: var(--hemma-popup-entity-background, rgba(0, 0, 0, 0.4)) !important;
                          border: none !important;
                          box-shadow: none !important;
                          border-radius: 9999px !important;
                          margin-bottom: 8px !important;
                          transition:
                            background 0.18s ease,
                            border-color 0.18s ease !important;
                        }

                        ha-card:hover,
                        ha-card:focus-within,
                        ha-card:active {
                          --ha-card-box-shadow: none !important;
                          --button-card-box-shadow: none !important;
                          --button-card-box-shadow-hover: none !important;
                          background: var(--hemma-popup-entity-hover, rgba(0, 0, 0, 0.5)) !important;
                          border-color: var(--hemma-popup-entity-border-hover, rgba(255,255,255,0.08)) !important;
                          box-shadow: none !important;
                          filter: none !important;
                          transform: none !important;
                        }
                      `
                    }
                  }));
                ]]]

  tap_action: *light_popup

  icon_tap_action: *light_popup

  icon_hold_action: *light_popup

  styles:
    entity_picture:
      - width: 100%
      - height: 100%
      - object-fit: contain
      - opacity: 0.8
      - transition: opacity 0.2s ease, filter 0.2s ease, transform 0.15s ease
      - cursor: pointer

    img_cell:
      - background: transparent
      - box-shadow: none !important
      - transition: filter 0.2s ease
      - cursor: pointer

  extra_styles: |
    #img-cell {
      position: relative;
      border-radius: 50% !important;
      background: var(--hemma-icon-circle-bg, rgba(255,255,255,0.10)) !important;
      width: 44px !important;
      height: 44px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      overflow: hidden !important;
    }
    #img-cell::before { opacity: 0 !important; }
    #img-cell img {
      width: 68% !important;
      height: 68% !important;
      max-width: 68% !important;
      max-height: 68% !important;
      object-fit: contain !important;
      flex: none !important;
    }
    #img-cell ha-icon {
      --mdc-icon-size: 26px !important;
      flex: none !important;
      color: rgba(255,255,255,1.0) !important;
    }
    #icon { color: rgba(255,255,255,1.0) !important; }
    @media (max-width: 767px) and (orientation: portrait) {
      #img-cell { width: 38px !important; height: 38px !important; }
      #img-cell ha-icon { --mdc-icon-size: 23px !important; }
      #toggle { filter: invert(var(--hemma-toggle-invert, 0)); }
    }
    @media (hover: hover) {
      #img-cell:hover { filter: brightness(1.15); transform: scale(1.03); transition: filter 0.15s ease, transform 0.15s ease; }
    }
    @media (hover: none) {
      #img-cell:active { filter: brightness(1.15); transform: scale(1.03); }
    }