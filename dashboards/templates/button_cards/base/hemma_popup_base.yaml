hemma_popup_base:

  tap_action:
    haptic: light
    action: |
      [[[
        return typeof window.browser_mod !== 'undefined' ? 'fire-dom-event' : 'more-info';
      ]]]
    entity: "[[[ return entity?.entity_id; ]]]"
    browser_mod:
      service: browser_mod.popup
      data:
        tag: '[[[ return (entity?.entity_id || "hemma_popup").replace(/\./g, "_"); ]]]'
        title: ""
        dismissable: true
        adaptive: true
        size: auto
        popup_styles:
          - style: all
            styles: |
              ha-adaptive-dialog, ha-dialog { --dialog-surface-margin-top: 100px; }
              @media (min-width: 1250px) {
                ha-adaptive-dialog, ha-dialog { --dialog-surface-margin-top: 150px; }
              }

  icon_tap_action:
    haptic: light
    action: |
      [[[
        return typeof window.browser_mod !== 'undefined' ? 'fire-dom-event' : 'more-info';
      ]]]
    entity: "[[[ return entity?.entity_id; ]]]"
    browser_mod:
      service: browser_mod.popup
      data:
        tag: '[[[ return (entity?.entity_id || "hemma_popup").replace(/\./g, "_"); ]]]'
        title: ""
        dismissable: true
        adaptive: true
        size: auto
        popup_styles:
          - style: all
            styles: |
              ha-adaptive-dialog, ha-dialog { --dialog-surface-margin-top: 100px; }
              @media (min-width: 1250px) {
                ha-adaptive-dialog, ha-dialog { --dialog-surface-margin-top: 150px; }
              }
