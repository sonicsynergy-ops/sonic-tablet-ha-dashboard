hemma_popup_base:

  tap_action:
    haptic: light
    action: |
      [[[
        return typeof window.browser_mod !== 'undefined' ? 'fire-dom-event' : 'more-info';
      ]]]
    entity: "[[[ return entity?.entity_id; ]]]"
    browser_mod:
      service: browser_mod.popup
      data:
        title: ""
        dismissable: true
        adaptive: true
        size: "[[[ return window.innerWidth >= 1250 ? 'auto' : 'fullscreen'; ]]]"

  icon_tap_action:
    haptic: light
    action: |
      [[[
        return typeof window.browser_mod !== 'undefined' ? 'fire-dom-event' : 'more-info';
      ]]]
    entity: "[[[ return entity?.entity_id; ]]]"
    browser_mod:
      service: browser_mod.popup
      data:
        title: ""
        dismissable: true
        adaptive: true
        size: "[[[ return window.innerWidth >= 1250 ? 'auto' : 'fullscreen'; ]]]"
