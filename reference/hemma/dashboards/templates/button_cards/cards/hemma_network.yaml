# Network Speed Card
# Shows WAN (internet) activity as a tier label based on download/upload speeds.
# The card entity should be the WAN download-speed sensor; set upload_sensor (or
# entity_upload) to the matching WAN upload-speed sensor.
#
# LAN stat sensors (entity_stat_1–4) are informational only — they appear as tiles
# in the popup but do NOT affect the badge label or active state. This ensures the
# card only lights up for actual internet traffic, not local LAN activity (e.g. a
# local media server stream).
#
# Variables:
#   upload_sensor    - entity ID for the WAN upload speed sensor
#   icon             - icon filename (default: wifi)
#   idle_threshold   - max Mbps (both) to show "Idle" (default: 1)
#   light_threshold  - max Mbps to show "Light ..." (default: 10)
#   heavy_threshold  - min Mbps to show "Heavy ..." (default: 50)
#                      between light and heavy = "Active ..."
#   action_1_entity  - optional button entity for the first action tile (e.g. button.router_reboot)
#   action_1_label   - display label for action 1 (falls back to entity friendly name)
#   action_2_entity  - optional button entity for the second action tile
#   action_2_label   - display label for action 2
#
# Card is visually active (glowing) when WAN max speed >= light_threshold.

hemma_network:
  template:
    - hemma_entity
    - hemma_popup_network

  variables:
    upload_sensor: null
    icon: wifi
    idle_threshold: 1
    light_threshold: 10
    heavy_threshold: 50
    room_name: null
    entity_download: null
    entity_upload: null
    entity_ping: null
    entity_status: null
    entity_stat_1: null
    entity_stat_2: null
    entity_stat_3: null
    entity_stat_4: null
    action_1_entity: null
    action_1_label: null
    action_1_status: null
    action_2_entity: null
    action_2_label: null
    action_2_status: null

  triggers_update:
    - '[[[ return variables.entity_upload || variables.upload_sensor || "" ]]]'
    - '[[[ return variables.entity_stat_1 || "" ]]]'
    - '[[[ return variables.entity_stat_2 || "" ]]]'
    - '[[[ return variables.entity_stat_3 || "" ]]]'
    - '[[[ return variables.entity_stat_4 || "" ]]]'
    - '[[[ return variables.action_1_status || "" ]]]'
    - '[[[ return variables.action_2_status || "" ]]]'

  icon_tap_action:
    action: more-info
    entity: >
      [[[
        const ulId = variables.entity_upload || variables.upload_sensor;
        const dl = parseFloat(entity?.state);
        const ul = parseFloat(states[ulId]?.state);
        return (Number.isFinite(ul) && ul > dl && ulId)
          ? ulId
          : entity.entity_id;
      ]]]

  hold_action:
    action: more-info
    entity: >
      [[[
        const ulId = variables.entity_upload || variables.upload_sensor;
        const dl = parseFloat(entity?.state);
        const ul = parseFloat(states[ulId]?.state);
        return (Number.isFinite(ul) && ul > dl && ulId)
          ? ulId
          : entity.entity_id;
      ]]]

  # Idle · Light Downloads/Uploads · Active Downloads/Uploads · Heavy Downloads/Uploads
  state_display: >
    [[[
      const dlId  = variables.entity_download || entity?.entity_id;
      const ulId  = variables.entity_upload   || variables.upload_sensor || null;
      const stat1 = variables.entity_stat_1 || null;
      const stat2 = variables.entity_stat_2 || null;
      const stat3 = variables.entity_stat_3 || null;
      const stat4 = variables.entity_stat_4 || null;

      const safe = (id) => { if (!id) return null; const n = parseFloat(states[id]?.state); return isNaN(n) ? null : n; };

      // Tier and direction: WAN sensors only. LAN stat sensors (stat1–4) are
      // informational (popup tiles) and must not drive the badge label or state.
      const allVals = [safe(dlId), safe(ulId)].filter(v => v != null);
      const max = allVals.length > 0 ? Math.max(...allVals) : 0;

      const dl   = safe(dlId);
      const ul   = safe(ulId);
      const dlOk = dl != null;
      const ulOk = ul != null;

      const idle  = Number(variables.idle_threshold  ?? 1);
      const light = Number(variables.light_threshold ?? 10);
      const heavy = Number(variables.heavy_threshold ?? 50);

      if (max < idle) return 'Idle';

      const tier = max < light ? 'Light' : max < heavy ? 'Active' : 'Heavy';
      const dir  = (!dlOk || (ulOk && ul > dl)) ? 'Upload' : 'Download';
      return `${tier} ${dir}`;
    ]]]

  extra_styles: |
    #img-cell {
      position: relative;
      border-radius: 50% !important;
      background: var(--hemma-icon-circle-bg, rgba(255,255,255,0.10)) !important;
      width: 44px !important;
      height: 44px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      overflow: hidden !important;
    }
    #img-cell::before { opacity: 0 !important; }
    #img-cell img {
      width: 68% !important;
      height: 68% !important;
      max-width: 68% !important;
      max-height: 68% !important;
      object-fit: contain !important;
      flex: none !important;
    }
    #img-cell ha-icon {
      --mdc-icon-size: 26px !important;
      flex: none !important;
      color: rgba(255,255,255,1.0) !important;
    }
    #icon { color: rgba(255,255,255,1.0) !important; }
    @media (max-width: 767px) and (orientation: portrait) {
      #img-cell { width: 38px !important; height: 38px !important; }
      #img-cell ha-icon { --mdc-icon-size: 23px !important; }
      #toggle { filter: invert(var(--hemma-toggle-invert, 0)); }
    }
    @media (hover: hover) {
      #img-cell:hover { filter: brightness(1.15); transform: scale(1.03); transition: filter 0.15s ease, transform 0.15s ease; }
    }
    @media (hover: none) {
      #img-cell:active { filter: brightness(1.15); transform: scale(1.03); }
    }

  # Heavy: glowing + yellow name color
  # Active/Light: glowing only (name stays default color)
  state:
    - operator: template
      value: |
        [[[
          const safe = (id) => { if (!id) return null; const n = parseFloat(states[id]?.state); return isNaN(n) ? null : n; };
          const vals = [
            safe(variables.entity_download || entity?.entity_id),
            safe(variables.entity_upload || variables.upload_sensor),
          ].filter(v => v != null);
          const max   = vals.length > 0 ? Math.max(...vals) : 0;
          const heavy = Number(variables.heavy_threshold ?? 50);
          return max >= heavy;
        ]]]
      styles:
        card:
          - "--hemma-active-overlay-opacity": "1"
          - "--hemma-active-overlay-dur": "0s"
          - --hemma-entity-top-gradient: none
          - box-shadow: var(--hemma-button-card-box-shadow-active-current, var(--button-card-box-shadow-active, var(--button-card-box-shadow))) !important
          - --hemma-icon-color-current: var(--hemma-popup-yellow-color, #ffd600)
          - --hemma-icon-svg-url: "url('/local/hemma/icons/wifi.svg')"
          - --hemma-icon-use-mask: "1"
          - --hemma-entity-icon-animation: none
          - --hemma-icon-circle-bg: var(--hemma-icon-color-current)
        name:
          - color: var(--hemma-entity-name-active, var(--primary-text-color))
        state:
          - color: var(--hemma-entity-state-active-color)
        img_cell:
          - opacity: "1 !important"
          - filter: none !important
          - background: "var(--hemma-popup-yellow-color, #ffd600) !important"
        entity_picture:
          - opacity: "1 !important"
          - filter: none !important
    - operator: template
      value: |
        [[[
          const safe = (id) => { if (!id) return null; const n = parseFloat(states[id]?.state); return isNaN(n) ? null : n; };
          const vals = [
            safe(variables.entity_download || entity?.entity_id),
            safe(variables.entity_upload || variables.upload_sensor),
          ].filter(v => v != null);
          const max   = vals.length > 0 ? Math.max(...vals) : 0;
          const light = Number(variables.light_threshold ?? 10);
          return max >= light;
        ]]]
      styles:
        card:
          - "--hemma-active-overlay-opacity": "1"
          - "--hemma-active-overlay-dur": "0s"
          - --hemma-entity-top-gradient: none
          - box-shadow: var(--hemma-button-card-box-shadow-active-current, var(--button-card-box-shadow-active, var(--button-card-box-shadow))) !important
          - --hemma-icon-color-current: var(--hemma-popup-primary-color, #00c3d0)
          - --hemma-icon-svg-url: "url('/local/hemma/icons/wifi.svg')"
          - --hemma-icon-use-mask: "1"
          - --hemma-entity-icon-animation: none
          - --hemma-icon-circle-bg: var(--hemma-icon-color-current)
        name:
          - color: var(--hemma-entity-name-active, var(--primary-text-color))
        state:
          - color: var(--hemma-entity-state-active-color)
        img_cell:
          - opacity: "1 !important"
          - filter: none !important
          - background: "var(--hemma-popup-primary-color, #00c3d0) !important"
        entity_picture:
          - opacity: "1 !important"
          - filter: none !important
