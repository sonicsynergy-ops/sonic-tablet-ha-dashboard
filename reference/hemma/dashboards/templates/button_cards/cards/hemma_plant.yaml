hemma_plant:
  template:
    - hemma_entity
    - hemma_popup_plant

  variables:
    icon: plant
    low_threshold: 30
    sensors: []   # list of extra sensor entity IDs to show in popup
    use_flower_card: false

  hold_action:
    action: more-info

  state_display: |
    [[[
      if (!entity?.state || entity.state === 'unavailable') return '— %';

      const sensors = Array.isArray(variables.sensors) ? variables.sensors.filter(Boolean) : [];

      if (sensors.length > 0) {
        const safeNum = (id) => {
          const s = states[id]?.state;
          if (!s || s === 'unavailable' || s === 'unknown') return null;
          const n = parseFloat(s);
          return isNaN(n) ? null : n;
        };
        const getSensorType = (eid) => {
          const id = eid.toLowerCase();
          if (id.includes('moisture'))                       return 'moisture';
          if (id.includes('illumin') || id.includes('lux')) return 'illuminance';
          if (id.includes('temp'))                           return 'temperature';
          if (id.includes('conductiv'))                      return 'conductivity';
          if (id.includes('humid'))                          return 'humidity';
          return null;
        };
        const attrs    = entity.attributes || {};
        const scorable = sensors.filter(id => { const t = getSensorType(id); return t && Object.prototype.hasOwnProperty.call(attrs, t + '_status'); });
        const scored   = scorable.filter(id => safeNum(id) != null);

        if (scorable.length > 0 && scored.length === 0) return 'Unavailable';

        if (scored.length > 0) {
          const bad   = scored.filter(id => { const v = attrs[getSensorType(id) + '_status']; return v && v !== 'ok' && v !== 'null'; }).length;
          const ratio = (scored.length - bad) / scored.length;
          if (ratio >= 1)   return 'Healthy';
          if (ratio >= 0.8) return 'Needs care';
          if (ratio >= 0.6) return 'Struggling';
          if (ratio >= 0.4) return 'Poor';
          return 'Critical';
        }
      }

      if (entity.state === 'ok') return 'Healthy';
      if (entity.state === 'problem') return 'Needs Attention';

      const val = parseFloat(entity.state);
      if (!Number.isNaN(val)) return `${Math.round(val)} %`;

      const attr = parseFloat(entity.attributes?.moisture);
      if (!Number.isNaN(attr)) return `${Math.round(attr)} %`;
      return '— %';
    ]]]

  state:
    - operator: template
      value: |
        [[[
          if (entity?.state === 'problem') return true;

          const sensors = Array.isArray(variables.sensors) ? variables.sensors.filter(Boolean) : [];
          if (sensors.length > 0) {
            const safeNum = (id) => {
              const s = states[id]?.state;
              if (!s || s === 'unavailable' || s === 'unknown') return null;
              const n = parseFloat(s);
              return isNaN(n) ? null : n;
            };
            const getSensorType = (eid) => {
              const id = eid.toLowerCase();
              if (id.includes('moisture'))                       return 'moisture';
              if (id.includes('illumin') || id.includes('lux')) return 'illuminance';
              if (id.includes('temp'))                           return 'temperature';
              if (id.includes('conductiv'))                      return 'conductivity';
              if (id.includes('humid'))                          return 'humidity';
              return null;
            };
            const attrs = entity?.attributes || {};
            const hasProblems = sensors.some(id => {
              if (safeNum(id) == null) return false;
              const type = getSensorType(id);
              if (!type) return false;
              const v = attrs[type + '_status'];
              return v && v !== 'ok' && v !== 'null';
            });
            if (hasProblems) return true;
          }

          const threshold = Number(variables.low_threshold ?? 30);
          const val = parseFloat(entity?.state);
          if (Number.isFinite(val)) return val <= threshold;
          const attr = parseFloat(entity?.attributes?.moisture);
          return Number.isFinite(attr) && attr <= threshold;
        ]]]
      styles:
        card:
          - "--hemma-active-overlay-opacity": "1"
          - "--hemma-active-overlay-dur": "0s"
          - --hemma-entity-top-gradient: none
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
          - --hemma-icon-color-current: '#34C759'
          - --hemma-icon-svg-url: "url('/local/hemma/icons/plant.svg')"
          - --hemma-icon-use-mask: "1"
          - --hemma-entity-icon-animation: none
          - --hemma-icon-circle-bg: '#34C759'
        name:
          - color: var(--hemma-entity-name-active, var(--primary-text-color))
        state:
          - color: var(--hemma-entity-state-active-color)
        img_cell:
          - opacity: "1 !important"
          - filter: none !important
          - background: "#34C759 !important"
        entity_picture:
          - opacity: "1 !important"
          - filter: none !important

  extra_styles: |
    #img-cell {
      position: relative;
      border-radius: 50% !important;
      background: var(--hemma-icon-circle-bg, rgba(255,255,255,0.10)) !important;
      width: 44px !important;
      height: 44px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      overflow: hidden !important;
    }
    #img-cell::before { opacity: 0 !important; }
    #img-cell img {
      width: 64% !important;
      height: 64% !important;
      max-width: 64% !important;
      max-height: 64% !important;
      object-fit: contain !important;
      flex: none !important;
    }
    #img-cell ha-icon {
      --mdc-icon-size: 26px !important;
      flex: none !important;
      color: rgba(255,255,255,1.0) !important;
    }
    #icon { color: rgba(255,255,255,1.0) !important; }
    @media (max-width: 767px) and (orientation: portrait) {
      #img-cell { width: 38px !important; height: 38px !important; }
      #img-cell ha-icon { --mdc-icon-size: 23px !important; }
      #toggle { filter: invert(var(--hemma-toggle-invert, 0)); }
    }
    @media (hover: hover) {
      #img-cell:hover { filter: brightness(1.15); transform: scale(1.03); transition: filter 0.15s ease, transform 0.15s ease; }
    }
    @media (hover: none) {
      #img-cell:active { filter: brightness(1.15); transform: scale(1.03); }
    }
